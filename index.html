<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invi.kr — 다이어리 초대장</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#e8e8e8;overflow:hidden}
input,textarea,button{font-family:'Pretendard',-apple-system,sans-serif}
#app{width:100%;height:100dvh;position:relative;overflow:hidden}
.pg{position:absolute;inset:0;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .2s}
.pg.on{visibility:visible;opacity:1;pointer-events:auto;z-index:10}
#pg1{background:linear-gradient(180deg,#5773F8 0%,#fff 52%,#92B0F8 100%)}
.pg1-logo{position:absolute;top:52px;left:50%;transform:translateX(-50%);font-size:40px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:-2px;-webkit-text-stroke:2px #000;text-shadow:3px 3px 0 #000}
.pg1-sub{position:absolute;top:116px;left:50%;transform:translateX(-50%);font-size:13px;color:#1c1c1e;font-weight:500;white-space:nowrap}
.pg1-scroll{position:absolute;top:144px;left:0;right:0;bottom:0;overflow-y:auto;padding:0 16px 100px}
.pg1-sec{font-size:11px;font-weight:700;color:#888;letter-spacing:0.5px;margin:12px 0 8px}
.tpl-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.tpl-row::-webkit-scrollbar{display:none}
.tpl-card{flex-shrink:0;width:130px;height:163px;border:2px solid #000;border-radius:4px;box-shadow:2px 2px 0 #000;overflow:hidden;cursor:pointer;position:relative;background:#fff;transition:transform .1s,box-shadow .1s}
.tpl-card:active{transform:translate(2px,2px);box-shadow:none}
.tpl-card-inner{width:100%;height:100%;position:relative;overflow:hidden}
.tpl-card-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);color:#fff;font-size:11px;font-weight:700;text-align:center;padding:5px 0;z-index:10}
#pg2{background:#f0f0ec}
.topbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:50;background:rgba(255,255,255,.97);border-bottom:1.5px solid #000}
.topbar-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000;color:#fff}
.tbtn{border:1.5px solid #000;border-radius:200px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:1.5px 1px 0 #000;background:#fff;color:#111;-webkit-tap-highlight-color:transparent}
.tbtn.pk{background:#ffd7f6}
.tbtn:active{transform:translate(1.5px,1px);box-shadow:none}
#canvas{position:absolute;top:52px;left:0;right:0;bottom:68px;overflow:visible;touch-action:none}
#canvas-inner{position:absolute;inset:0;overflow:hidden}
#canvas-bg{position:absolute;inset:0;pointer-events:none}
#canvas-stage{position:absolute;inset:0;overflow:visible}
.el{position:absolute;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
.el.sel>.inn{outline:2px dashed #5773F8;outline-offset:4px}
.inn{position:relative;display:inline-block}
.el-del{position:absolute;top:-14px;right:-14px;width:26px;height:26px;background:#111;color:#fff;border:none;border-radius:50%;font-size:14px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200;line-height:1}
.el.sel .el-del{display:flex}
.el-rz{position:absolute;bottom:-10px;right:-10px;width:22px;height:22px;background:#5773F8;border:2px solid #fff;border-radius:50%;cursor:nwse-resize;display:none;z-index:200;touch-action:none}
.el.sel .el-rz{display:block}
.el-rot{position:absolute;top:-28px;left:50%;transform:translateX(-50%);width:24px;height:24px;background:#FF8C42;border:2px solid #fff;border-radius:50%;cursor:grab;display:none;z-index:200;touch-action:none;font-size:13px;color:#fff;align-items:center;justify-content:center;line-height:1}
.el.sel .el-rot{display:flex}
.el-edit{position:absolute;top:-14px;left:-14px;width:26px;height:26px;background:#5773F8;border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200;font-size:12px;color:#fff;line-height:1}
.el.sel .el-edit{display:flex}
.et,.ed,.ep,.em{font-family:'Pretendard',-apple-system,sans-serif !important}
.et{background:#ffd7f6;border:1.5px solid #000;border-radius:3px;padding:6px 10px;font-size:13px;font-weight:700;color:#000;white-space:nowrap;box-shadow:2px 2px 0 #000}
.ed{background:#79e0f2;border:1.5px solid #000;border-radius:3px;padding:8px 14px;font-size:13px;font-weight:700;color:#000;white-space:nowrap;box-shadow:2px 2px 0 #000}
.ep{background:#f2f079;border:1.5px solid #000;border-radius:3px;padding:6px 10px;font-size:13px;font-weight:700;color:#11100c;white-space:nowrap;box-shadow:2px 2px 0 #000}
.em{background:#79bff2;border:1.5px solid #000;padding:8px 10px;font-size:13px;font-weight:700;color:#11100c;width:140px;word-break:keep-all;line-height:1.5;box-shadow:2px 2px 0 #000}
.ei{border:2px solid #000;border-radius:3px;box-shadow:2px 2px 0 #000;overflow:hidden;display:block}
.ei img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none}
.esi{display:block;background:transparent;border:none;box-shadow:none}
.esi img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}
[contenteditable]{outline:none;min-width:20px;min-height:1em}
[contenteditable]:empty:before{content:attr(data-ph);opacity:.35;font-weight:400}
#toolbar{position:fixed;bottom:0;left:0;right:0;height:68px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:space-around;padding:0 4px;z-index:9999}
.tlbtn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 6px;-webkit-tap-highlight-color:transparent}
.ico{width:36px;height:36px;border:1.5px solid #000;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:1.5px 1.5px 0 #000;transition:transform .1s,box-shadow .1s;font-size:17px}
.tlbtn:active .ico{transform:translate(1.5px,1.5px);box-shadow:none}
.tlbtn span{font-size:9px;font-weight:600;color:#11100c}
.panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;padding:14px 16px;display:none;flex-direction:column;gap:10px;max-height:260px;overflow-y:auto}
.panel.open{display:flex}
.prow{display:flex;gap:8px;align-items:center}
.pinp{flex:1;height:40px;border:1.5px solid #000;border-radius:6px;padding:0 12px;font-size:14px;outline:none;background:#fff}
.padd{height:40px;padding:0 16px;background:#000;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.tychips{display:flex;gap:6px;flex-wrap:wrap}
.tych{padding:6px 12px;border:1.5px solid #000;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:1.5px 1.5px 0 #000}
.tych.tt{background:#ffd7f6}.tych.td{background:#79e0f2}.tych.tp{background:#f2f079}.tych.tm{background:#79bff2}
.tych.on{box-shadow:none;transform:translate(1.5px,1.5px)}
#stk-panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;display:none;flex-direction:column;max-height:280px}
#stk-panel.open{display:flex}
.stk-cats{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 16px 8px;border-bottom:1px solid #e3e1db;flex-shrink:0}
.stk-cats::-webkit-scrollbar{display:none}
.cch{padding:4px 12px;border:1px solid #000;border-radius:200px;font-size:11px;font-weight:600;background:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cch.on{background:#000;color:#fff}
.stk-grid-wrap{overflow-y:auto;padding:10px 16px 16px;flex:1;min-height:0}
.sgrid{display:flex;flex-wrap:wrap;gap:6px}
.st{cursor:pointer;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border:1.5px solid #e3e1db;border-radius:8px;overflow:hidden;flex-shrink:0}
.st img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.st:active{transform:scale(.93)}
.bgpresets{display:flex;gap:6px;flex-wrap:wrap;width:100%}
.bgbtn{width:44px;height:44px;border:2px solid #000;border-radius:8px;cursor:pointer;box-shadow:1.5px 1.5px 0 #000}
.bgbtn:active{transform:translate(1.5px,1.5px);box-shadow:none}
#img-input,#bg-input{display:none}
#edit-bar{position:fixed;bottom:68px;left:0;right:0;height:44px;background:#5773F8;display:none;align-items:center;justify-content:center;gap:10px;z-index:9997}
#edit-bar.on{display:flex}
#edit-bar span{font-size:13px;font-weight:700;color:#fff}
.edit-done-btn{border:1.5px solid #fff;border-radius:200px;padding:5px 14px;font-size:12px;font-weight:700;color:#fff;background:transparent;cursor:pointer}
#dialog{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:24px}
.dialog-box{background:#fff;border:2px solid #000;border-radius:12px;box-shadow:4px 4px 0 #000;padding:24px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:16px}
.dialog-box h3{font-size:16px;font-weight:800;color:#111;line-height:1.4}
.dialog-box p{font-size:13px;color:#555;line-height:1.6}
.dialog-btns{display:flex;gap:8px}
.dialog-btns button{flex:1;height:44px;border-radius:8px;border:1.5px solid #000;font-size:13px;font-weight:700;cursor:pointer;box-shadow:1.5px 1.5px 0 #000}
.dbtn-cancel{background:#fff;color:#111}
.dbtn-confirm{background:#111;color:#fff;border-color:#111}
#pg3{background:linear-gradient(180deg,#5773F8 0%,#fff 52%,#92B0F8 100%)}
.pg3-top{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,255,255,.97);border-bottom:1.5px solid #000;z-index:20}
#pg3-box{position:absolute;top:60px;left:16px;right:16px;bottom:158px;border:2px solid #000;border-radius:4px;box-shadow:3px 3px 0 #000;overflow:hidden;background:#fff}
.sharearea{position:absolute;bottom:0;left:0;right:0;height:150px;background:#fff;border-top:1.5px solid #000;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.shr-title{font-size:13px;font-weight:700}
.linkbox{display:flex;align-items:center;gap:8px;background:#f5f5f0;border:1.5px solid #000;border-radius:6px;padding:8px 12px}
.linkurl{flex:1;font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copybtn{padding:6px 12px;background:#000;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer}
.shrbtns{display:flex;gap:8px}
.shrbtn{flex:1;height:40px;border:1.5px solid #000;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;box-shadow:2px 2px 0 #000;display:flex;align-items:center;justify-content:center;gap:6px}
.shrbtn.kk{background:#FEE500;color:#000}
.shrbtn.lk{background:#ffd7f6;color:#000}
.shrbtn:active{transform:translate(2px,2px);box-shadow:none}
#pg4{background:linear-gradient(180deg,#5773F8 0%,#fff 52%,#92B0F8 100%)}
.pg4-top{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.97);border-bottom:1.5px solid #000;z-index:20}
.pg4-logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000;color:#fff}
#pg4-box{position:absolute;top:60px;left:16px;right:16px;bottom:80px;border:2px solid #000;border-radius:4px;box-shadow:3px 3px 0 #000;overflow:hidden;background:#fff}
.pg4-bottom{position:absolute;bottom:0;left:0;right:0;height:72px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 20px}
.pg4-made{font-size:12px;color:#888;font-weight:500}
.pg4-made strong{color:#5773F8;font-weight:800}
.pg4-make-btn{padding:9px 22px;background:#000;color:#fff;border:none;border-radius:200px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #555;white-space:nowrap}
.rr{position:absolute;top:0;left:0;transform-origin:top left}
.rr-bg{position:absolute;inset:0}
.rr-stage{position:absolute;inset:0}
#loading{position:fixed;inset:0;z-index:999999;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading.on{display:flex}
.spin{width:36px;height:36px;border:3px solid #e3e1db;border-top-color:#5773F8;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{font-size:14px;font-weight:600;color:#555}

</head>
<body>
<div id="app">
<div id="loading"><div class="spin"></div><p id="loading-msg">잠시만요...</p></div>

<div id="pg1" class="pg on">
  <div class="pg1-logo">Invi.kr</div>
  <p class="pg1-sub">템플릿을 골라 바로 편집하세요</p>
  <div class="pg1-scroll">
    <p class="pg1-sec">TEMPLATES</p>
    <div class="tpl-row" id="tpl-row"></div>
  </div>
</div>

<div id="pg2" class="pg">
  <div class="topbar">
    <button class="tbtn" onclick="confirmBack()">← 뒤로</button>
    <span class="topbar-logo">Invi.kr</span>
    <button class="tbtn pk" onclick="goShare()">완성 →</button>
  </div>
  <div id="canvas">
    <div id="canvas-inner">
      <div id="canvas-bg"></div>
      <div id="canvas-stage"></div>
    </div>
  </div>
  <div id="edit-bar">
    <span>텍스트 편집 중</span>
    <button class="edit-done-btn" onclick="exitEditMode()">완료</button>
  </div>
  <div id="text-panel" class="panel">
    <div class="tychips">
      <div class="tych tt on" onclick="setTy('t',this)">제목</div>
      <div class="tych td" onclick="setTy('d',this)">날짜</div>
      <div class="tych tp" onclick="setTy('p',this)">장소</div>
      <div class="tych tm" onclick="setTy('m',this)">메모</div>
    </div>
    <div class="prow">
      <input class="pinp" id="tinp" placeholder="텍스트 입력..." maxlength="80" onkeydown="if(event.key==='Enter')addTxt()">
      <button class="padd" onclick="addTxt()">추가</button>
    </div>
  </div>
  <div id="stk-panel">
    <div class="stk-cats" id="catrow"></div>
    <div class="stk-grid-wrap"><div class="sgrid" id="sgrid"></div></div>
  </div>
  <div id="bg-panel" class="panel" style="gap:8px">
    <div class="bgpresets" id="bgpresets"></div>
    <button onclick="document.getElementById('bg-input').click()" style="width:100%;height:40px;border:1.5px dashed #888;border-radius:8px;background:#f9f9f9;font-size:13px;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">📷 내 사진으로 배경 설정</button>
  </div>
  <input type="file" id="img-input" accept="image/*" onchange="addImg(event)">
  <input type="file" id="bg-input" accept="image/*" onchange="setBgImg(event)">
  <div id="toolbar">
    <button class="tlbtn" onclick="tp('text-panel')"><div class="ico" style="font-weight:900;font-size:16px">T</div><span>텍스트</span></button>
    <button class="tlbtn" onclick="document.getElementById('img-input').click()"><div class="ico">🖼</div><span>사진</span></button>
    <button class="tlbtn" onclick="tp('stk-panel')"><div class="ico">★</div><span>스티커</span></button>
    <button class="tlbtn" onclick="tp('bg-panel')"><div class="ico">🎨</div><span>배경</span></button>
    <button class="tlbtn" onclick="confirmReset()" style="opacity:.55"><div class="ico">↺</div><span>초기화</span></button>
  </div>
</div>

<div id="pg3" class="pg">
  <div class="pg3-top">
    <button class="tbtn" onclick="go('pg2','pg3')">← 수정</button>
    <span style="font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000">Invi.kr</span>
    <div style="width:60px"></div>
  </div>
  <div id="pg3-box"></div>
  <div class="sharearea">
    <p class="shr-title">초대장 완성! 친구들에게 공유하세요 🎉</p>
    <div class="linkbox">
      <span class="linkurl" id="shareurl">링크 생성 중...</span>
      <button class="copybtn" onclick="copyLink()">복사</button>
    </div>
    <div class="shrbtns">
      <button class="shrbtn kk" onclick="nativeShare()">공유하기 ↗</button>
      <button class="shrbtn lk" onclick="copyLink()">링크 복사</button>
    </div>
  </div>
</div>

<div id="pg4" class="pg">
  <div class="pg4-top"><span class="pg4-logo">Invi.kr</span></div>
  <div id="pg4-box"></div>
  <div class="pg4-bottom">
    <p class="pg4-made">made with <strong>Invi.kr</strong></p>
    <button class="pg4-make-btn" onclick="goMakeMyOwn()">나도 만들기 →</button>
  </div>
</div>

<div id="dialog" style="display:none">
  <div class="dialog-box">
    <h3 id="dlg-title"></h3>
    <p id="dlg-msg"></p>
    <div class="dialog-btns">
      <button class="dbtn-cancel" onclick="closeDialog()">계속 편집</button>
      <button class="dbtn-confirm" id="dlg-ok">확인</button>
    </div>
  </div>
</div>
</div>

function renderTemplateCard(tpl){
  var W=tpl.W,H=tpl.H;
  var scale=Math.min(130/W,163/H);
  var inner=document.createElement('div');
  inner.className='tpl-card-inner';
  inner.style.cssText='position:relative;width:130px;height:163px;overflow:hidden;';
  var cont=document.createElement('div');
  cont.style.cssText='position:absolute;top:0;left:0;width:'+W+'px;height:'+H+'px;transform:scale('+scale+');transform-origin:top left;';
  var bg0=document.createElement('div');
  bg0.style.cssText='position:absolute;inset:0;background:'+tpl.bg+';';
  cont.appendChild(bg0);
  tpl.layers.forEach(function(layer){
    if(layer.type==='bgimg'){
      var el=document.createElement('div');
      el.style.cssText='position:absolute;inset:0;background-image:url('+layer.src+');background-size:'+layer.bgSize+';background-position:'+layer.bgPos+';background-repeat:repeat;';
      cont.appendChild(el);
    } else if(layer.type==='imgbox'){
      var wrap=document.createElement('div');
      var rot=layer.rot?'transform:rotate('+layer.rot+'deg);transform-origin:center;':'';
      wrap.style.cssText='position:absolute;left:'+layer.x+'px;top:'+layer.y+'px;width:'+layer.w+'px;height:'+layer.h+'px;border:2px solid #000;box-shadow:2px 2px 0 #000;overflow:hidden;'+rot;
      var img=document.createElement('img');img.src=layer.src;
      img.style.cssText='width:100%;height:100%;object-fit:'+(layer.fit||'cover')+';pointer-events:none;display:block;';
      wrap.appendChild(img);cont.appendChild(wrap);
    } else if(layer.type==='tag'){
      var cm={et:'background:#ffd7f6;',ed:'background:#79e0f2;',ep:'background:#f2f079;',em:'background:#79bff2;'};
      var w=layer.cls==='em'?'width:136px;':'';
      var rot=layer.rot?'transform:rotate('+layer.rot+'deg);transform-origin:center;':'';
      var fs=layer.smallText?'font-size:6px;':'font-size:9px;';
      var el=document.createElement('div');
      el.style.cssText='position:absolute;left:'+layer.x+'px;top:'+layer.y+'px;'+cm[layer.cls]+'border:1px solid #000;border-radius:2px;padding:4px 8px;'+fs+'font-weight:700;color:#11100c;box-shadow:1.5px 1.5px 0 #000;'+w+rot+'word-break:keep-all;line-height:1.4;';
      el.textContent=layer.text;cont.appendChild(el);
    } else if(layer.type==='sticker'){
      var el=document.createElement('div');
      el.style.cssText='position:absolute;left:'+layer.x+'px;top:'+layer.y+'px;width:'+layer.w+'px;height:'+layer.h+'px;';
      var img=document.createElement('img');img.src=layer.src;
      img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;';
      el.appendChild(img);cont.appendChild(el);
    }
  });
  inner.appendChild(cont);return inner;
}

function loadTemplate(tpl){
  var stage=document.getElementById('canvas-stage');
  stage.innerHTML='';S.nid=1;S.sel=null;S.editMode=false;exitEditMode();
  CUR_BG={val:tpl.bg,isImg:false};applyBg();go('pg2','pg1');
  var bgLayer=tpl.layers.find(function(l){return l.type==='bgimg';});
  if(bgLayer){
    var bgEl=document.getElementById('canvas-bg');
    bgEl.style.backgroundImage='url('+bgLayer.src+')';
    bgEl.style.backgroundSize=bgLayer.bgSize;
    bgEl.style.backgroundPosition=bgLayer.bgPos;
    bgEl.style.backgroundRepeat='repeat';
  }
  setTimeout(function(){
    var sw=stage.clientWidth,sh=stage.clientHeight;
    var sx=sw/tpl.W,sy=sh/tpl.H;
    tpl.layers.forEach(function(layer){
      if(layer.type==='bgimg')return;
      var x=Math.round(layer.x*sx),y=Math.round(layer.y*sy);
      if(layer.type==='imgbox'){
        var w=Math.round(layer.w*sx),h=Math.round(layer.h*sy);
        var el=addEl('i',layer.src,x,y,w,h);
        if(layer.rot&&el){el._rot=layer.rot;el.style.transform='rotate('+layer.rot+'deg)';}
      } else if(layer.type==='tag'){
        var el=addEl(layer.cls[1],layer.text,x,y);
        if(layer.rot&&el){el._rot=layer.rot;el.style.transform='rotate('+layer.rot+'deg)';}
        if(layer.smallText&&el){var c=el.querySelector('.em');if(c)c.style.fontSize='10px';}
      } else if(layer.type==='sticker'){
        var w=Math.round(layer.w*sx),h=Math.round(layer.h*sy);
        addImgSticker(layer.src,x,y,w,h);
      }
    });
  },40);
}

function showLoading(msg){document.getElementById('loading-msg').textContent=msg||'잠시만요...';document.getElementById('loading').classList.add('on');}
function hideLoading(){document.getElementById('loading').classList.remove('on');}

async function saveToServer(data){
  var resp=await fetch(JSONBIN_URL,{method:'POST',headers:{'Content-Type':'application/json','X-Access-Key':JSONBIN_KEY,'X-Bin-Private':'false','X-Bin-Name':'invi-'+Date.now()},body:JSON.stringify(data)});
  if(!resp.ok)throw new Error('저장 실패 '+resp.status);
  var json=await resp.json();return json.metadata.id;
}
async function loadFromServer(binId){
  var resp=await fetch(JSONBIN_URL+'/'+binId+'/latest',{headers:{'X-Access-Key':JSONBIN_KEY}});
  if(!resp.ok)throw new Error('불러오기 실패 '+resp.status);
  var json=await resp.json();return json.record;
}

async function checkHash(){
  var hash=location.hash;
  if(hash&&hash.startsWith('#inv-')){
    var binId=hash.slice(5);
    showLoading('초대장 불러오는 중...');
    try{
      SNAP=await loadFromServer(binId);
      hideLoading();showResultOnly();
    }catch(e){
      hideLoading();
      alert('초대장을 불러오지 못했어요.');
      history.replaceState(null,'',location.pathname);
      showPage('pg1');
    }
  }
}

function addEl(type,content,x,y,w,h){
  var stage=document.getElementById('canvas-stage');
  var id='e'+(S.nid++);
  var wrap=document.createElement('div');wrap.id=id;wrap.className='el';
  wrap.style.left=Math.max(0,x)+'px';wrap.style.top=Math.max(0,y)+'px';wrap.dataset.type=type;
  var inn=document.createElement('div');inn.className='inn';
  var cel;
  if(type==='i'){
    cel=document.createElement('div');cel.className='ei';cel.style.width=(w||120)+'px';cel.style.height=(h||120)+'px';
    var img=document.createElement('img');img.src=content;cel.appendChild(img);
  } else {
    var typeMap={t:'et',d:'ed',p:'ep',m:'em'};
    var cls=typeMap[type]||(type.length===2?type:'et');
    cel=document.createElement('div');cel.className=cls;cel.textContent=content;cel.dataset.isText='1';cel.setAttribute('data-ph','텍스트 입력');
  }
  inn.appendChild(cel);
  var del=document.createElement('button');del.className='el-del';del.textContent='×';
  del.addEventListener('pointerdown',function(e){e.stopPropagation();});
  del.addEventListener('click',function(e){e.stopPropagation();stage.removeChild(wrap);if(S.sel===id)S.sel=null;exitEditMode();});
  var editBtn=null;
  if(cel.dataset.isText){editBtn=document.createElement('div');editBtn.className='el-edit';editBtn.textContent='✏';editBtn.addEventListener('click',function(e){e.stopPropagation();sel(id);enterEditMode(cel);});}
  var rz=document.createElement('div');rz.className='el-rz';rz.addEventListener('pointerdown',function(e){e.stopPropagation();startRz(e,wrap,cel,type);});
  var rot=document.createElement('div');rot.className='el-rot';rot.textContent='↻';rot.addEventListener('pointerdown',function(e){e.stopPropagation();startRot(e,wrap);});
  inn.appendChild(del);if(editBtn)inn.appendChild(editBtn);inn.appendChild(rz);inn.appendChild(rot);wrap.appendChild(inn);
  wrap.addEventListener('pointerdown',function(e){
    if(e.target===del||e.target===rz||e.target===rot||(editBtn&&e.target===editBtn))return;
    if(cel.contentEditable==='true')return;
    e.preventDefault();closeP();sel(id);startDrag(e,wrap);
  });
  if(cel.dataset.isText){
    cel.addEventListener('blur',function(){cel.contentEditable='false';S.editMode=false;document.getElementById('edit-bar').classList.remove('on');});
    cel.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cel.blur();}if(e.key==='Escape'){cel.blur();}});
  }
  stage.appendChild(wrap);return wrap;
}

function addImgSticker(url,x,y,w,h){
  w=w||72;h=h||72;
  var stage=document.getElementById('canvas-stage');
  var id='e'+(S.nid++);
  var wrap=document.createElement('div');wrap.id=id;wrap.className='el';
  wrap.style.left=Math.max(0,x)+'px';wrap.style.top=Math.max(0,y)+'px';wrap.dataset.type='si';
  var inn=document.createElement('div');inn.className='inn';
  var cel=document.createElement('div');cel.className='esi';cel.style.width=w+'px';cel.style.height=h+'px';
  var img=document.createElement('img');img.src=url;img.alt='sticker';
  cel.appendChild(img);inn.appendChild(cel);
  var del=document.createElement('button');del.className='el-del';del.textContent='×';
  del.addEventListener('pointerdown',function(e){e.stopPropagation();});
  del.addEventListener('click',function(e){e.stopPropagation();stage.removeChild(wrap);if(S.sel===id)S.sel=null;});
  var rz=document.createElement('div');rz.className='el-rz';rz.addEventListener('pointerdown',function(e){e.stopPropagation();startRz(e,wrap,cel,'si');});
  var rot=document.createElement('div');rot.className='el-rot';rot.textContent='↻';rot.addEventListener('pointerdown',function(e){e.stopPropagation();startRot(e,wrap);});
  inn.appendChild(del);inn.appendChild(rz);inn.appendChild(rot);wrap.appendChild(inn);
  wrap.addEventListener('pointerdown',function(e){if(e.target===del||e.target===rz||e.target===rot)return;e.preventDefault();closeP();sel(id);startDrag(e,wrap);});
  stage.appendChild(wrap);return wrap;
}

function sel(id){desel();S.sel=id;var el=document.getElementById(id);if(el)el.classList.add('sel');}
function desel(){if(S.sel){var o=document.getElementById(S.sel);if(o)o.classList.remove('sel');S.sel=null;}}
document.getElementById('canvas').addEventListener('pointerdown',function(e){var t=e.target;if(t===document.getElementById('canvas')||t===document.getElementById('canvas-inner')||t===document.getElementById('canvas-bg')||t===document.getElementById('canvas-stage')){desel();closeP();exitEditMode();}});
function startDrag(e,wrap){var stage=document.getElementById('canvas-stage');var sx=e.clientX,sy=e.clientY,sl=parseInt(wrap.style.left)||0,st=parseInt(wrap.style.top)||0;try{wrap.setPointerCapture(e.pointerId);}catch(err){}wrap.style.cursor='grabbing';wrap.style.zIndex='99';function mv(e){wrap.style.left=(sl+(e.clientX-sx))+'px';wrap.style.top=(st+(e.clientY-sy))+'px';}function up(){wrap.style.cursor='grab';wrap.style.zIndex='';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);}
function startRz(e,wrap,cel,type){var sx=e.clientX,sy=e.clientY,sw=cel.offsetWidth||80,sh=cel.offsetHeight||80,ss=parseFloat(cel.style.fontSize)||parseFloat(getComputedStyle(cel).fontSize)||13;wrap.setPointerCapture(e.pointerId);function mv(e){var dx=e.clientX-sx,dy=e.clientY-sy,d=(dx+dy)/2;if(type==='si'||type==='i'){cel.style.width=Math.max(30,sw+dx)+'px';cel.style.height=Math.max(30,sh+dy)+'px';}else{cel.style.fontSize=Math.max(8,Math.min(60,ss+d*.2))+'px';}}function up(){wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);}
function startRot(e,wrap){var rect=wrap.getBoundingClientRect();var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;var startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);var curRot=wrap._rot||0;try{wrap.setPointerCapture(e.pointerId);}catch(err){}wrap.style.cursor='grabbing';function mv(e){var angle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);wrap._rot=curRot+(angle-startAngle);wrap.style.transform='rotate('+wrap._rot+'deg)';}function up(){wrap.style.cursor='grab';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);}
function addImg(e){var f=e.target.files[0];if(!f)return;if(f.size>800*1024){toast('이미지가 너무 커요 (최대 800KB)');e.target.value='';return;}var r=new FileReader();r.onload=function(ev){var stage=document.getElementById('canvas-stage');var sw=stage.clientWidth,sh=stage.clientHeight;addEl('i',ev.target.result,sw/2-60+(Math.random()-.5)*60,sh/2-60+(Math.random()-.5)*60,120,120);};r.readAsDataURL(f);e.target.value='';}
function buildStk(){var cr=document.getElementById('catrow');cr.innerHTML='';CATS.forEach(function(c){var el=document.createElement('div');el.className='cch'+(c===S.cat?' on':'');el.textContent=c==='all'?'전체':c;el.onclick=function(){S.cat=c;buildStk();};cr.appendChild(el);});var g=document.getElementById('sgrid');g.innerHTML='';var cats=S.cat==='all'?Object.keys(STK):[S.cat];cats.forEach(function(cat){STK[cat].forEach(function(url){var el=document.createElement('div');el.className='st';var img=document.createElement('img');img.src=url;img.alt='';el.appendChild(img);el.onclick=function(){var stage=document.getElementById('canvas-stage');var sw=stage.clientWidth,sh=stage.clientHeight;addImgSticker(url,sw/2-36+(Math.random()-.5)*80,sh/2-36+(Math.random()-.5)*60);closeP();};g.appendChild(el);});});}

function makeSnap(){
  var stage=document.getElementById('canvas-stage');
  var clone=stage.cloneNode(true);
  clone.querySelectorAll('.el-del,.el-rz,.el-edit,.el-rot').forEach(function(el){el.remove();});
  clone.querySelectorAll('.el').forEach(function(el){el.classList.remove('sel');el.style.pointerEvents='none';el.style.cursor='default';});
  clone.querySelectorAll('[contenteditable]').forEach(function(el){el.removeAttribute('contenteditable');});
  var bgEl=document.getElementById('canvas-bg');
  return{stageW:stage.clientWidth,stageH:stage.clientHeight,bgVal:CUR_BG.val,bgIsImg:CUR_BG.isImg,bgImgUrl:bgEl.style.backgroundImage,bgImgSize:bgEl.style.backgroundSize,bgImgPos:bgEl.style.backgroundPosition,bgImgRepeat:bgEl.style.backgroundRepeat,elemsHTML:clone.innerHTML};
}

function renderSnap(boxId){
  var box=document.getElementById(boxId);box.innerHTML='';
  var bw=box.clientWidth,bh=box.clientHeight;
  var scale=Math.min(bw/SNAP.stageW,bh/SNAP.stageH);
  var rend=document.createElement('div');rend.className='rr';
  rend.style.width=SNAP.stageW+'px';rend.style.height=SNAP.stageH+'px';
  rend.style.transform='scale('+scale+')';rend.style.transformOrigin='top left';
  rend.style.left=((bw-SNAP.stageW*scale)/2)+'px';rend.style.top=((bh-SNAP.stageH*scale)/2)+'px';
  var bg=document.createElement('div');bg.className='rr-bg';
  if(SNAP.bgIsImg){bg.style.backgroundImage='url('+SNAP.bgVal+')';bg.style.backgroundSize='cover';bg.style.backgroundPosition='center';}
  else{
    bg.style.background=SNAP.bgVal;
    if(SNAP.bgImgUrl&&SNAP.bgImgUrl!=='none'&&SNAP.bgImgUrl){bg.style.backgroundImage=SNAP.bgImgUrl;bg.style.backgroundSize=SNAP.bgImgSize||'auto';bg.style.backgroundPosition=SNAP.bgImgPos||'left top';bg.style.backgroundRepeat=SNAP.bgImgRepeat||'repeat';}
  }
  rend.appendChild(bg);
  var sd=document.createElement('div');sd.className='rr-stage';sd.innerHTML=SNAP.elemsHTML;
  rend.appendChild(sd);box.appendChild(rend);
}

async function goShare(){
  desel();exitEditMode();
  SNAP=makeSnap();
  renderSnap('pg3-box');
  go('pg3','pg2');
  document.getElementById('shareurl').textContent='링크 생성 중...';
  showLoading('초대장 서버에 저장 중...');
  try{
    var binId=await saveToServer(SNAP);
    var url=location.href.split('#')[0]+'#inv-'+binId;
    SHARE_URL=url;document.getElementById('shareurl').textContent=url;
    hideLoading();toast('링크가 생성됐어요!');
  }catch(e){
    hideLoading();
    document.getElementById('shareurl').textContent='저장 실패. 다시 시도해주세요.';
    toast('서버 저장 실패. 잠시 후 다시 시도해주세요.');
  }
}

function nativeShare(){var url=SHARE_URL||document.getElementById('shareurl').textContent;if(navigator.share){navigator.share({title:'Invi.kr 초대장',text:'초대장을 확인하세요! 🎉',url:url}).catch(function(){});}else{copyLink();}}
function copyLink(){var url=SHARE_URL||document.getElementById('shareurl').textContent;if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){toast('링크가 복사됐어요!');});}else{toast(url);}}

var _cb=null;
function showDialog(title,msg,cb){document.getElementById('dlg-title').textContent=title;document.getElementById('dlg-msg').textContent=msg;_cb=cb;document.getElementById('dialog').style.display='flex';}
function closeDialog(){document.getElementById('dialog').style.display='none';_cb=null;}
document.getElementById('dlg-ok').addEventListener('click',function(){if(_cb)_cb();closeDialog();});
function confirmBack(){showDialog('작업을 취소하시겠어요?','현재 초대장이 사라집니다.',function(){go('pg1','pg2');});}
function confirmReset(){showDialog('캔버스를 초기화할까요?','배치된 모든 요소가 삭제됩니다.',function(){var stage=document.getElementById('canvas-stage');stage.innerHTML='';S.nid=1;S.sel=null;});}
function toast(msg){var t=document.getElementById('_t');if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:200px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},2200);}

document.getElementById('toolbar').style.display='none';
buildHome();
checkHash();
</script>
