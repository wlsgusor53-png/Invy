<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invi.kr — 초대장 만들기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#e8e8e8;overflow:hidden}
input,textarea,button{font-family:'Pretendard',-apple-system,sans-serif}
#app{width:100%;height:100dvh;position:relative;overflow:hidden}
.pg{position:absolute;inset:0;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .18s}
.pg.on{visibility:visible;opacity:1;pointer-events:auto;z-index:10}

/* ══════════════════════════════════
   S1 홈
══════════════════════════════════ */
#pg1{background:linear-gradient(180deg,#5773F8 0%,#fff 52%,#92B0F8 100%)}
.pg1-logo{position:absolute;top:46px;left:50%;transform:translateX(-50%);font-size:36px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:-2px;-webkit-text-stroke:2px #000;text-shadow:3px 3px 0 #000}
.pg1-sub{position:absolute;top:98px;left:50%;transform:translateX(-50%);font-size:13px;color:#1c1c1e;font-weight:500;white-space:nowrap}

/* 칩 */
.pg1-chips{position:absolute;top:122px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px}
.chip-row{display:flex;gap:6px}
.chip{padding:8px 16px;border:1px solid #000;border-radius:200px;background:linear-gradient(180deg,#fff 0%,#848484 100%);font-size:14px;font-weight:700;color:#1c1c1e;cursor:pointer;box-shadow:1.5px 1px 0 #000;white-space:nowrap;transition:transform .1s,box-shadow .1s}
.chip:active{transform:translate(1.5px,1px);box-shadow:none}
.chip.sel{background:linear-gradient(180deg,#fff 0%,#69b274 100%)}

/* 쇼케이스 — 기존 v15 카드 사이즈(160×200) 복원 + 가운데 정렬 */
.pg1-scroll{position:absolute;top:206px;left:0;right:0;bottom:68px;display:flex;flex-direction:column;align-items:center;padding:0 14px}
.pg1-sec{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;align-self:flex-start;margin:8px 0 8px 0}
.showcase-wrap{flex:1;display:flex;align-items:center;justify-content:center}
/* 카드: 기존 160×200 */
.tpl-card{width:160px;height:200px;border:2px solid #000;border-radius:4px;box-shadow:2px 2px 0 #000;overflow:hidden;cursor:pointer;position:relative;background:#fff;transition:transform .1s,box-shadow .1s}
.tpl-card:active{transform:translate(2px,2px);box-shadow:none}
.tpl-card-inner{position:absolute;inset:0;overflow:hidden}
.tpl-card-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);color:#fff;font-size:11px;font-weight:700;text-align:center;padding:5px 0;z-index:10}
/* 전환 fade */
.tpl-card-inner{animation:fcc .18s ease}
@keyframes fcc{from{opacity:0}to{opacity:1}}

.pg1-startbtn{position:absolute;bottom:0;left:0;right:0;height:68px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:center}
.pg1-startbtn button{width:220px;height:44px;background:#111;color:#fff;border:none;border-radius:200px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #555}
.pg1-startbtn button:active{transform:translate(2px,2px);box-shadow:none}

/* ══════════════════════════════════
   S2 편집
══════════════════════════════════ */
#pg2{background:#f0f0ec}
.topbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:50;background:rgba(255,255,255,.97);border-bottom:1.5px solid #000}
.topbar-logo{position:absolute;left:50%;transform:translateX(-50%);font-size:18px;font-weight:800;letter-spacing:-.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000;color:#fff}
.tbtn{border:1.5px solid #000;border-radius:200px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:1.5px 1px 0 #000;background:#fff;color:#111}
.tbtn.pk{background:#ffd7f6}
.tbtn:active{transform:translate(1.5px,1px);box-shadow:none}

#canvas{position:absolute;top:52px;left:0;right:0;bottom:68px;touch-action:none;background:#f0f0ec}
#canvas-inner{position:absolute;top:14px;left:14px;right:14px;bottom:14px;overflow:hidden;border-radius:6px;border:1.5px solid rgba(0,0,0,.12);box-shadow:0 2px 20px rgba(0,0,0,.1)}
#canvas-bg{position:absolute;inset:0;pointer-events:none}
#canvas-stage{position:absolute;inset:0;overflow:visible}

.el{position:absolute;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
.el.sel>.inn{outline:2px dashed #5773F8;outline-offset:4px}
.inn{position:relative;display:inline-block}

/* 삭제 */
.el-del{position:absolute;top:-14px;right:-14px;width:26px;height:26px;background:#111;color:#fff;border:none;border-radius:50%;font-size:15px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200;line-height:1}
.el.sel .el-del{display:flex}

/* 리사이즈 핸들 (SVG 아이콘, 파란 닷 아님) */
.el-rz{position:absolute;bottom:-12px;right:-12px;width:24px;height:24px;background:#fff;border:2px solid #5773F8;border-radius:50%;cursor:nwse-resize;display:none;z-index:200;touch-action:none;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(87,115,248,.35)}
.el.sel .el-rz{display:flex}
.el-rz svg{width:12px;height:12px}

/* 회전 핸들 */
.el-rot{position:absolute;top:-28px;left:50%;transform:translateX(-50%);width:24px;height:24px;background:#FF8C42;border:2px solid #fff;border-radius:50%;cursor:grab;display:none;z-index:200;touch-action:none;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.el.sel .el-rot{display:flex}
.el-rot svg{width:13px;height:13px}

/* 텍스트 편집 (SVG 아이콘) */
.el-edit{position:absolute;top:-14px;left:-14px;width:26px;height:26px;background:#5773F8;border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200}
.el.sel .el-edit{display:flex}
.el-edit svg{width:13px;height:13px}

/* 이미지 교체 (SVG 아이콘) */
.el-replace{position:absolute;bottom:-14px;left:-14px;width:26px;height:26px;background:#FF8C42;border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200}
.el.sel .el-replace{display:flex}
.el-replace svg{width:13px;height:13px}

/* 태그 스타일 */
.et,.ed,.ep,.em{font-family:'Pretendard',-apple-system,sans-serif !important}
.et{background:#ffd7f6;border:1.5px solid #000;border-radius:3px;padding:6px 10px;font-size:13px;font-weight:700;color:#000;white-space:nowrap;box-shadow:2px 2px 0 #000}
.ed{background:#79e0f2;border:1.5px solid #000;border-radius:3px;padding:8px 14px;font-size:13px;font-weight:700;color:#000;white-space:nowrap;box-shadow:2px 2px 0 #000}
.ep{background:#f2f079;border:1.5px solid #000;border-radius:3px;padding:6px 10px;font-size:13px;font-weight:700;color:#11100c;white-space:nowrap;box-shadow:2px 2px 0 #000}
.em{background:#79bff2;border:1.5px solid #000;padding:8px 10px;font-size:13px;font-weight:700;color:#11100c;width:140px;word-break:keep-all;line-height:1.5;box-shadow:2px 2px 0 #000}
.ei{border:2px solid #000;border-radius:3px;box-shadow:2px 2px 0 #000;overflow:hidden;display:block}
.ei img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none}
.esi{display:block;background:transparent;border:none;box-shadow:none}
.esi img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}
[contenteditable]{outline:none;min-width:20px;min-height:1em}
[contenteditable]:empty:before{content:attr(data-ph);opacity:.35;font-weight:400}

/* 툴바 SVG 아이콘 */
#toolbar{position:fixed;bottom:0;left:0;right:0;height:68px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:space-around;padding:0 4px;z-index:9999}
.tlbtn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 6px}
.ico{width:36px;height:36px;border:1.5px solid #000;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:1.5px 1.5px 0 #000;transition:transform .1s,box-shadow .1s}
.tlbtn:active .ico{transform:translate(1.5px,1.5px);box-shadow:none}
.tlbtn span{font-size:9px;font-weight:600;color:#11100c}
.ico svg{width:19px;height:19px}

/* 패널 */
.panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;padding:14px 16px;display:none;flex-direction:column;gap:10px;max-height:260px;overflow-y:auto}
.panel.open{display:flex}
.prow{display:flex;gap:8px;align-items:center}
.pinp{flex:1;height:40px;border:1.5px solid #000;border-radius:6px;padding:0 12px;font-size:14px;outline:none;background:#fff}
.padd{height:40px;padding:0 16px;background:#000;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.tychips{display:flex;gap:6px;flex-wrap:wrap}
.tych{padding:6px 12px;border:1.5px solid #000;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:1.5px 1.5px 0 #000}
.tych.tt{background:#ffd7f6}.tych.td{background:#79e0f2}.tych.tp{background:#f2f079}.tych.tm{background:#79bff2}
.tych.on{box-shadow:none;transform:translate(1.5px,1.5px)}

/* 스티커 패널 — 우측 여백 제거 */
#stk-panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;display:none;flex-direction:column;max-height:280px}
#stk-panel.open{display:flex}
.stk-cats{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 16px 8px;border-bottom:1px solid #e3e1db;flex-shrink:0}
.stk-cats::-webkit-scrollbar{display:none}
.cch{padding:4px 12px;border:1px solid #000;border-radius:200px;font-size:11px;font-weight:600;background:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cch.on{background:#000;color:#fff}
.stk-grid-wrap{overflow-y:auto;padding:10px 16px 16px;flex:1;min-height:0}
/* 우측 여백 없애기: 그리드 꽉 채움 */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,52px);gap:6px;width:100%}
.st{cursor:pointer;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border:1.5px solid #e3e1db;border-radius:8px;overflow:hidden}
.st img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.st:active{transform:scale(.93)}

/* 배경 패널 */
#bg-panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;padding:12px 16px;display:none;flex-direction:column;gap:10px;max-height:190px}
#bg-panel.open{display:flex}
.bg-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;flex:1}
.bg-row::-webkit-scrollbar{display:none}
.bgthumb{flex-shrink:0;width:56px;height:80px;border:2px solid #ccc;border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .1s,border-color .1s;background:#eee}
.bgthumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.bgthumb.sel{border-color:#5773F8;box-shadow:0 0 0 1.5px #5773F8}
.bgthumb:active{transform:scale(.93)}
.bg-upload-btn{flex-shrink:0;width:56px;height:80px;border:1.5px dashed #aaa;border-radius:6px;background:#f9f9f9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.bg-upload-btn svg{width:20px;height:20px;opacity:.5}
.bg-upload-btn span{font-size:9px;font-weight:600;color:#888}

#img-input,#bg-input,#replace-input{display:none}
#edit-bar{position:fixed;bottom:68px;left:0;right:0;height:44px;background:#5773F8;display:none;align-items:center;justify-content:center;gap:10px;z-index:9997}
#edit-bar.on{display:flex}
#edit-bar span{font-size:13px;font-weight:700;color:#fff}
.edit-done-btn{border:1.5px solid #fff;border-radius:200px;padding:5px 14px;font-size:12px;font-weight:700;color:#fff;background:transparent;cursor:pointer}

#dialog{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:24px}
.dialog-box{background:#fff;border:2px solid #000;border-radius:12px;box-shadow:4px 4px 0 #000;padding:24px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:16px}
.dialog-box h3{font-size:16px;font-weight:800;color:#111;line-height:1.4}
.dialog-box p{font-size:13px;color:#555;line-height:1.6}
.dialog-btns{display:flex;gap:8px}
.dialog-btns button{flex:1;height:44px;border-radius:8px;border:1.5px solid #000;font-size:13px;font-weight:700;cursor:pointer;box-shadow:1.5px 1.5px 0 #000}
.dbtn-cancel{background:#fff;color:#111}
.dbtn-confirm{background:#111;color:#fff;border-color:#111}

/* ══════════════════════════════════
   S3 공유
══════════════════════════════════ */
#pg3{background:linear-gradient(180deg,#5773F8 0%,#fff 52%,#92B0F8 100%)}
.pg3-top{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,255,255,.97);border-bottom:1.5px solid #000;z-index:20}
#pg3-box{position:absolute;top:60px;left:16px;right:16px;bottom:158px;border:2px solid #000;border-radius:4px;box-shadow:3px 3px 0 #000;overflow:hidden;background:#fff}
.sharearea{position:absolute;bottom:0;left:0;right:0;height:150px;background:#fff;border-top:1.5px solid #000;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.shr-title{font-size:13px;font-weight:700;color:#111}
.linkbox{display:flex;align-items:center;gap:8px;background:#f5f5f0;border:1.5px solid #000;border-radius:6px;padding:8px 12px}
.linkurl{flex:1;font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copybtn{padding:6px 14px;background:#111;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.copybtn:active{opacity:.7}
/* 공유 버튼 — 카카오 제거, 공유하기+더보기 2개 */
.shrbtns{display:flex;gap:8px}
.shrbtn{flex:1;height:42px;border:1.5px solid #000;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #000;display:flex;align-items:center;justify-content:center;gap:6px}
.shrbtn.main{background:#111;color:#fff;border-color:#111}
.shrbtn.sub{background:#ffd7f6;color:#111}
.shrbtn:active{transform:translate(2px,2px);box-shadow:none}
.shrbtn svg{width:15px;height:15px;flex-shrink:0}

/* ══════════════════════════════════
   S4 결과
══════════════════════════════════ */
#pg4{background:linear-gradient(180deg,#5773F8 0%,#fff 52%,#92B0F8 100%)}
.pg4-top{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.97);border-bottom:1.5px solid #000;z-index:20}
.pg4-logo{font-size:20px;font-weight:800;letter-spacing:-.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000;color:#fff}
#pg4-box{position:absolute;top:60px;left:16px;right:16px;bottom:80px;border:2px solid #000;border-radius:4px;box-shadow:3px 3px 0 #000;overflow:hidden;background:#fff}
.pg4-bottom{position:absolute;bottom:0;left:0;right:0;height:72px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.pg4-made{font-size:12px;color:#888;font-weight:500}
.pg4-made strong{color:#5773F8;font-weight:800}
.pg4-make-btn{padding:9px 22px;background:#111;color:#fff;border:none;border-radius:200px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #555;white-space:nowrap}
.rr{position:absolute;top:0;left:0;transform-origin:top left}
.rr-bg{position:absolute;inset:0}
.rr-stage{position:absolute;inset:0}

#loading{position:fixed;inset:0;z-index:999999;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading.on{display:flex}
.spin{width:36px;height:36px;border:3px solid #e3e1db;border-top-color:#5773F8;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{font-size:14px;font-weight:600;color:#555}
</style>
</head>
<body>
<div id="app">
<div id="loading"><div class="spin"></div><p id="loading-msg">초대장 불러오는 중...</p></div>

<!-- S1 홈 -->
<div id="pg1" class="pg on">
  <div class="pg1-logo">Invi.kr</div>
  <p class="pg1-sub">어떤 자리를 만들고 싶으세요?</p>
  <div class="pg1-chips">
    <div class="chip-row">
      <div class="chip sel" data-tpl="party"   onclick="pickChip(this)">🎂 파티</div>
      <div class="chip"     data-tpl="brunch"  onclick="pickChip(this)">🧸 브런치</div>
      <div class="chip"     data-tpl="pajama"  onclick="pickChip(this)">🎉 파자마</div>
    </div>
    <div class="chip-row">
      <div class="chip"     data-tpl="wedding" onclick="pickChip(this)">💍 웨딩</div>
      <div class="chip"     data-tpl="fun"     onclick="pickChip(this)">🐌 병맛</div>
    </div>
  </div>
  <!-- 쇼케이스: 기존 160×200 카드 사이즈, 세로 가운데 -->
  <div class="pg1-scroll">
    <p class="pg1-sec">TEMPLATES</p>
    <div class="showcase-wrap">
      <div class="tpl-card" id="showcase-card" onclick="startFromChip()">
        <div class="tpl-card-inner" id="showcase-inner"></div>
        <div class="tpl-card-lbl"   id="showcase-lbl">파티</div>
      </div>
    </div>
  </div>
  <div class="pg1-startbtn">
    <button onclick="startFromChip()">이 템플릿으로 시작하기 →</button>
  </div>
</div>

<!-- S2 편집 -->
<div id="pg2" class="pg">
  <div class="topbar">
    <button class="tbtn" onclick="confirmBack()">← 뒤로</button>
    <span class="topbar-logo">Invi.kr</span>
    <button class="tbtn pk" onclick="goShare()">완성하기 →</button>
  </div>
  <div id="canvas">
    <div id="canvas-inner">
      <div id="canvas-bg"></div>
      <div id="canvas-stage"></div>
    </div>
  </div>
  <div id="edit-bar">
    <span>텍스트를 수정하고 있어요</span>
    <button class="edit-done-btn" onclick="exitEditMode()">완료</button>
  </div>
  <div id="text-panel" class="panel">
    <div class="tychips">
      <div class="tych tt on" onclick="setTy('t',this)">제목</div>
      <div class="tych td"    onclick="setTy('d',this)">날짜</div>
      <div class="tych tp"    onclick="setTy('p',this)">장소</div>
      <div class="tych tm"    onclick="setTy('m',this)">메모</div>
    </div>
    <div class="prow">
      <input class="pinp" id="tinp" placeholder="원하는 문구를 입력하세요" maxlength="80"
             onkeydown="if(event.key==='Enter')addTxt()">
      <button class="padd" onclick="addTxt()">추가</button>
    </div>
  </div>
  <div id="stk-panel">
    <div class="stk-cats" id="catrow"></div>
    <div class="stk-grid-wrap"><div class="sgrid" id="sgrid"></div></div>
  </div>
  <div id="bg-panel">
    <p style="font-size:11px;font-weight:700;color:#888;letter-spacing:.5px">배경 고르기</p>
    <div class="bg-row" id="bg-row"></div>
  </div>
  <input type="file" id="img-input"     accept="image/*" onchange="addImg(event)">
  <input type="file" id="bg-input"      accept="image/*" onchange="setBgImg(event)">
  <input type="file" id="replace-input" accept="image/*" onchange="replaceImg(event)">

  <div id="toolbar">
    <!-- 텍스트 T -->
    <button class="tlbtn" onclick="tp('text-panel')">

function preloadImg(url){
  if(!url||IMG_CACHE[url])return;
  var i=new Image();i.src=url;IMG_CACHE[url]=i;
}
// 백그라운드에서 에셋 미리 로드 (렉 방지)
function preloadAll(){
  setTimeout(function(){
    BG_IMGS.forEach(preloadImg);
    TEMPLATES.forEach(function(t){
      preloadImg(t.bgImg);
      t.layers.forEach(function(l){if(l.src)preloadImg(l.src);});
    });
    STK_IMGS.slice(0,12).forEach(preloadImg); // 첫 12개만 선제 로드
  },500);
}

function pickChip(el){
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
  S.curTpl=el.dataset.tpl;
  renderShowcase(S.curTpl);
}

function renderShowcase(tplId){
  var tpl=TEMPLATES.find(function(t){return t.id===tplId;})||TEMPLATES[0];

  document.getElementById('showcase-lbl').textContent=tpl.label;
  inner.innerHTML='';

  var W=tpl.W,H=tpl.H,scale=Math.min(160/W,200/H);
  var cont=document.createElement('div');
  cont.style.cssText='position:absolute;top:0;left:0;width:'+W+'px;height:'+H+'px;transform:scale('+scale+');transform-origin:top left;';

  // 배경 — fallback 먼저
  var bg=document.createElement('div');
  bg.style.cssText='position:absolute;inset:0;background:'+(tpl.bgFallback||'#f0f0f0')+';';
  if(tpl.bgImg){
    var bgi=document.createElement('img');

/* ══════════════════════════════════════════════
   ★★★ 링크 공유 핵심 — URL에 데이터 직접 인코딩
   기기/브라우저 관계없이 작동 (localStorage 한계 극복)
   방식: JSON → gzip 없이 base64 → URL hash
   용량 제한: 스냅샷 데이터가 크면 이미지 src를 URL만 남기고 압축
══════════════════════════════════════════════ */

// 스냅샷을 URL-safe base64로 인코딩
function encodeSnap(snap){
  // 이미지 src가 data:URL이면 크기가 커서 URL 한계 초과
  // → data:URL 이미지는 별도로 localStorage에 저장, snap엔 key만 담음
  var snapClean=JSON.parse(JSON.stringify(snap)); // deep copy
  var imgStore={};
  // elemsHTML에서 data:URL 이미지 추출해서 별도 저장
  snapClean.elemsHTML=snapClean.elemsHTML.replace(/src="(data:[^"]+)"/g,function(m,dataUrl){
    var k='di_'+Math.random().toString(36).slice(2,8);
    imgStore[k]=dataUrl;
    return 'src="__'+k+'__"';
  });
  // bgUrl이 data:URL이면 별도 저장
  if(snapClean.bgUrl&&snapClean.bgUrl.startsWith('data:')){
    var bk='bg_'+Math.random().toString(36).slice(2,8);
    imgStore[bk]=snapClean.bgUrl;
    snapClean.bgUrl='__'+bk+'__';
  }
  // imgStore를 localStorage에 저장
  if(Object.keys(imgStore).length>0){
    try{localStorage.setItem('invi_imgs',JSON.stringify(imgStore));}catch(e){}
  }
  var str=JSON.stringify(snapClean);
  return btoa(unescape(encodeURIComponent(str)));
}

// base64 → 스냅샷 복원
function decodeSnap(b64){
  var str=decodeURIComponent(escape(atob(b64)));
  var snap=JSON.parse(str);
  // localStorage에서 이미지 복원
  var imgStoreStr=localStorage.getItem('invi_imgs');
  var imgStore=imgStoreStr?JSON.parse(imgStoreStr):{};
  snap.elemsHTML=snap.elemsHTML.replace(/src="__(di_[^_]+)__"/g,function(m,k){
    return imgStore[k]?'src="'+imgStore[k]+'"':m;
  });
  if(snap.bgUrl&&snap.bgUrl.startsWith('__')){
    var bk=snap.bgUrl.slice(2,-2);
    if(imgStore[bk])snap.bgUrl=imgStore[bk];
  }
  return snap;
}

/* ── 해시 라우팅: 링크 접속 → 무조건 결과(S4) ── */
function checkHash(){
  var hash=location.hash;
  if(!hash||!hash.startsWith('#i='))return false;
  var b64=hash.slice(3);
  showLoading('초대장 불러오는 중...');
  try{
    SNAP=decodeSnap(b64);
    hideLoading();
    showResultOnly();
    return true;
  }catch(e){
    hideLoading();
    // 구 버전 inv- 형식 fallback
    if(hash.startsWith('#inv-')){
      var key=hash.slice(1);
      try{var str=localStorage.getItem('invi_'+key);if(str){SNAP=JSON.parse(str);showResultOnly();return true;}}catch(e2){}
    }
    alert('초대장을 불러오지 못했어요.\n링크가 올바른지 확인해주세요.');
    history.replaceState(null,'',location.pathname);
    showPage('pg1');return false;
  }
}

function mkSvgBtn(cls,svgHtml){
  var d=document.createElement('div');d.className=cls;d.innerHTML=svgHtml;return d;
}
function addEl(type,content,x,y,w,h,fallbackColor){
  var stage=document.getElementById('canvas-stage');
  var id='e'+(S.nid++);
  var wrap=document.createElement('div');wrap.id=id;wrap.className='el';
  wrap.style.left=Math.max(0,x)+'px';wrap.style.top=Math.max(0,y)+'px';wrap.dataset.type=type;
  var inn=document.createElement('div');inn.className='inn';
  var cel;
  if(type==='i'){
    cel=document.createElement('div');cel.className='ei';
    cel.style.width=(w||120)+'px';cel.style.height=(h||120)+'px';
    if(fallbackColor)cel.style.background=fallbackColor;
    var img=document.createElement('img');img.loading='lazy';img.src=content;
    img.onerror=function(){img.style.display='none';};
    cel.appendChild(img);
  } else {
    var tm={t:'et',d:'ed',p:'ep',m:'em'};var cls=tm[type]||(type.length===2?type:'et');
    cel=document.createElement('div');cel.className=cls;cel.textContent=content;
    cel.dataset.isText='1';cel.setAttribute('data-ph','내용 입력');
  }
  inn.appendChild(cel);
  // 삭제
  var del=document.createElement('button');del.className='el-del';del.innerHTML='&times;';
  del.addEventListener('pointerdown',function(e){e.stopPropagation();});
  del.addEventListener('click',function(e){e.stopPropagation();stage.removeChild(wrap);if(S.sel===id)S.sel=null;exitEditMode();});
  // 텍스트 편집
  var editBtn=null;
  if(cel.dataset.isText){
    editBtn=mkSvgBtn('el-edit',ICO.edit);
    editBtn.addEventListener('click',function(e){e.stopPropagation();sel(id);enterEditMode(cel);});
  }
  // 이미지 교체
  var replBtn=null;
  if(type==='i'){
    replBtn=mkSvgBtn('el-replace',ICO.imgReplace);
    replBtn.addEventListener('click',function(e){e.stopPropagation();replaceTargetId=id;document.getElementById('replace-input').click();});
  }
  // 리사이즈
  var rz=mkSvgBtn('el-rz',ICO.resize);
  rz.addEventListener('pointerdown',function(e){e.stopPropagation();startRz(e,wrap,cel,type);});
  // 회전
  var rot=mkSvgBtn('el-rot',ICO.rotate);
  rot.addEventListener('pointerdown',function(e){e.stopPropagation();startRot(e,wrap);});

  inn.appendChild(del);if(editBtn)inn.appendChild(editBtn);if(replBtn)inn.appendChild(replBtn);inn.appendChild(rz);inn.appendChild(rot);wrap.appendChild(inn);
  wrap.addEventListener('pointerdown',function(e){
    if(e.target===del||rz.contains(e.target)||rot.contains(e.target)||
       (editBtn&&editBtn.contains(e.target))||(replBtn&&replBtn.contains(e.target)))return;
    if(cel.contentEditable==='true')return;
    e.preventDefault();closeP();sel(id);startDrag(e,wrap);
  });
  if(cel.dataset.isText){
    cel.addEventListener('blur',function(){cel.contentEditable='false';S.editMode=false;document.getElementById('edit-bar').classList.remove('on');});
    cel.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cel.blur();}if(e.key==='Escape'){cel.blur();}});
  }
  stage.appendChild(wrap);return wrap;
}

function startDrag(e,wrap){var sx=e.clientX,sy=e.clientY,sl=parseInt(wrap.style.left)||0,st=parseInt(wrap.style.top)||0;try{wrap.setPointerCapture(e.pointerId);}catch(err){}wrap.style.cursor='grabbing';wrap.style.zIndex='99';function mv(e){wrap.style.left=(sl+(e.clientX-sx))+'px';wrap.style.top=(st+(e.clientY-sy))+'px';}function up(){wrap.style.cursor='grab';wrap.style.zIndex='';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);}
function startRz(e,wrap,cel,type){var sx=e.clientX,sy=e.clientY,sw=cel.offsetWidth||80,sh=cel.offsetHeight||80,ss=parseFloat(cel.style.fontSize)||parseFloat(getComputedStyle(cel).fontSize)||13;try{wrap.setPointerCapture(e.pointerId);}catch(err){}function mv(e){var dx=e.clientX-sx,dy=e.clientY-sy,d=(dx+dy)/2;if(type==='si'||type==='i'){cel.style.width=Math.max(30,sw+dx)+'px';cel.style.height=Math.max(30,sh+dy)+'px';}else{cel.style.fontSize=Math.max(8,Math.min(60,ss+d*.2))+'px';}}function up(){wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);}
function startRot(e,wrap){var rect=wrap.getBoundingClientRect();var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;var startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);var curRot=wrap._rot||0;try{wrap.setPointerCapture(e.pointerId);}catch(err){}wrap.style.cursor='grabbing';function mv(e){var angle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);wrap._rot=curRot+(angle-startAngle);wrap.style.transform='rotate('+wrap._rot+'deg)';}function up(){wrap.style.cursor='grab';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);}
function addImg(e){var f=e.target.files[0];if(!f)return;if(f.size>800*1024){toast('이미지가 너무 커요 (최대 800KB)');e.target.value='';return;}var r=new FileReader();r.onload=function(ev){var stage=document.getElementById('canvas-stage');var sw=stage.clientWidth,sh=stage.clientHeight;addEl('i',ev.target.result,sw/2-60+(Math.random()-.5)*60,sh/2-60+(Math.random()-.5)*60,120,120);};r.readAsDataURL(f);e.target.value='';}

function makeSnap(){

  return{stageW:stage.clientWidth,stageH:stage.clientHeight,bgUrl:CUR_BG_URL||'',bgFallback:CUR_BG_FB||'#f5f5f5',elemsHTML:clone.innerHTML};
}
function renderSnap(boxId){

  var rend=document.createElement('div');rend.className='rr';
  rend.style.width=SNAP.stageW+'px';rend.style.height=SNAP.stageH+'px';
  rend.style.transform='scale('+scale+')';rend.style.transformOrigin='top left';
  rend.style.left=((bw-SNAP.stageW*scale)/2)+'px';rend.style.top=((bh-SNAP.stageH*scale)/2)+'px';
  var bg=document.createElement('div');bg.className='rr-bg';
  bg.style.background=SNAP.bgFallback||'#f5f5f5';
  if(SNAP.bgUrl){bg.style.backgroundImage='url('+SNAP.bgUrl+')';bg.style.backgroundSize='cover';bg.style.backgroundPosition='center';}
  rend.appendChild(bg);
  var sd=document.createElement('div');sd.className='rr-stage';sd.innerHTML=SNAP.elemsHTML;rend.appendChild(sd);
  box.appendChild(rend);
}

/* ══════════════════════════════════════════════
   ★★★ 완성 → 공유 (URL 인코딩 — 기기 무관 작동)
══════════════════════════════════════════════ */
function goShare(){
  desel();exitEditMode();
  SNAP=makeSnap();
  renderSnap('pg3-box');
  go('pg3','pg2');
  var urlEl=document.getElementById('shareurl');
  urlEl.textContent='링크 만드는 중...';
  try{
    var b64=encodeSnap(SNAP);
    var url=location.href.split('#')[0]+'#i='+b64;
    // URL 너무 길면 단축 (브라우저 URL 한계 ~8000자)
    if(url.length>7500){
      toast('초대장 용량이 너무 커요. 사진 크기를 줄여주세요.');
      urlEl.textContent='링크 생성 실패 — 사진 크기를 줄여주세요';return;
    }
    SHARE_URL=url;
    urlEl.textContent=url;
    // history에도 반영해서 현재 페이지 공유 가능
    try{history.replaceState(null,'',url);}catch(e){}
    toast('링크가 생성됐어요! 바로 복사해서 공유하세요 🎉');
  }catch(e){
    urlEl.textContent='오류가 발생했어요. 다시 시도해주세요.';
    toast('오류: '+e.message);
    console.error(e);
  }
}

/* ── 공유 액션 (카카오 제거, 2개만) ── */
function copyLink(){
  var url=SHARE_URL||document.getElementById('shareurl').textContent;
  if(!url||url.indexOf('http')===-1){toast('먼저 초대장을 완성해주세요.');return;}
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){toast('링크 복사 완료! 원하는 곳에 붙여넣어 주세요 📋');}).catch(function(){fbCopy(url);});
  } else {fbCopy(url);}
}
function fbCopy(url){var ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');toast('링크 복사 완료! 📋');}catch(e){toast('직접 복사해주세요.');}document.body.removeChild(ta);}
function nativeShare(){
  var url=SHARE_URL||document.getElementById('shareurl').textContent;
  if(!url||url.indexOf('http')===-1){toast('먼저 완성하기를 눌러주세요.');return;}
  if(navigator.share){
    navigator.share({title:'Invi.kr 초대장',text:'초대장이 도착했어요!',url:url}).catch(function(){copyLink();});
  } else {copyLink();}
}

/* ── 다이얼로그 / 토스트 ── */
var _cb=null;
function showDialog(t,m,cb){document.getElementById('dlg-title').textContent=t;document.getElementById('dlg-msg').textContent=m;_cb=cb;document.getElementById('dialog').style.display='flex';}
function closeDialog(){document.getElementById('dialog').style.display='none';_cb=null;}
document.getElementById('dlg-ok').addEventListener('click',function(){if(_cb)_cb();closeDialog();});
function confirmBack(){showDialog('편집을 그만할까요?','지금까지 작업한 내용이 사라져요.',function(){go('pg1','pg2');});}
function confirmReset(){showDialog('처음부터 다시 할까요?','캔버스의 모든 요소가 지워져요.',function(){var s=document.getElementById('canvas-stage');s.innerHTML='';S.nid=1;S.sel=null;});}
function toast(msg){
  var t=document.getElementById('_t');
  if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:200px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},3000);
}

document.getElementById('toolbar').style.display='none';
buildHome();
