<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invi.kr — 초대장 만들기</title>
<meta property="og:type"        content="website">
<meta property="og:site_name"   content="Invi.kr">
<meta property="og:title"       content="초대장이 도착했어요 🎉">
<meta property="og:description" content="Invi.kr로 만든 초대장을 확인해보세요!">
<meta property="og:image"       id="og-image" content="">
<meta property="og:url"         id="og-url"   content="">
<meta name="twitter:card"       content="summary_large_image">
<meta name="twitter:image"      id="tw-image" content="">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
input,textarea,button{font-family:'Pretendard',-apple-system,sans-serif}
#app{width:390px;max-width:100vw;height:100dvh;position:relative;overflow:hidden;background:#fff}
.pg{position:absolute;inset:0;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .18s}
.pg.on{visibility:visible;opacity:1;pointer-events:auto;z-index:10}
 
/* ═══════════════════════════════════════
   S1 홈
═══════════════════════════════════════ */
#pg1{background:linear-gradient(180deg,#5773F8 0%,#fff 55%,#92B0F8 100%)}
.pg1-logo{position:absolute;top:46px;left:50%;transform:translateX(-50%);font-size:36px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:-2px;-webkit-text-stroke:2px #000;text-shadow:3px 3px 0 #000}
.pg1-sub{position:absolute;top:98px;width:100%;text-align:center;font-size:13px;color:#1c1c1e;font-weight:500}
.pg1-chips{position:absolute;top:122px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px}
.chip-row{display:flex;gap:6px}
.chip{padding:8px 16px;border:1.5px solid #000;border-radius:200px;background:#fff;font-size:13px;font-weight:700;color:#1c1c1e;cursor:pointer;box-shadow:2px 1.5px 0 #000;white-space:nowrap;transition:transform .1s,box-shadow .1s}
.chip:active{transform:translate(2px,1.5px);box-shadow:none}
.chip.sel{background:#111;color:#fff}
 
/* 쇼케이스 */
.pg1-mid{position:absolute;top:206px;left:0;right:0;bottom:68px;display:flex;flex-direction:column;align-items:center;padding:0 16px}
.pg1-sec{font-size:10px;font-weight:700;color:#888;letter-spacing:.8px;align-self:flex-start;margin:8px 0 10px}
.showcase-outer{flex:1;display:flex;align-items:center;justify-content:center}
.tpl-card{width:200px;height:250px;border:2.5px solid #000;border-radius:8px;box-shadow:4px 4px 0 #000;overflow:hidden;cursor:pointer;position:relative;transition:transform .1s,box-shadow .1s}
.tpl-card:active{transform:translate(3px,3px);box-shadow:none}
.tpl-card-body{position:absolute;inset:0}
.tpl-card-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.8);color:#fff;font-size:11px;font-weight:700;text-align:center;padding:7px 0;z-index:5}
 
/* 템플릿별 CSS 배경 (이미지 없이 즉시 렌더) */
.bg-party  {background:linear-gradient(135deg,#f5d0ff 0%,#e8b4ff 50%,#d4a0ff 100%)}
.bg-brunch {background:linear-gradient(135deg,#fff8d0 0%,#ffe89a 50%,#ffd86e 100%)}
.bg-pajama {background:linear-gradient(135deg,#ffd6f5 0%,#ffaee8 50%,#ff8edc 100%)}
.bg-wedding{background:linear-gradient(135deg,#fff0f0 0%,#ffd6d6 50%,#ffb8b8 100%)}
.bg-fun    {background:linear-gradient(135deg,#d0f7d0 0%,#a8eda8 50%,#80e080 100%)}
 
/* 카드 내부 데코 요소 */
.tpl-deco{position:absolute;font-size:13px;font-weight:700;white-space:nowrap;line-height:1.4}
.tpl-tag{display:inline-block;padding:3px 8px;border:1.5px solid #000;border-radius:2px;font-size:10px;font-weight:700;box-shadow:1.5px 1.5px 0 #000}
.tpl-tag.et{background:#ffd7f6}.tpl-tag.ed{background:#79e0f2}.tpl-tag.ep{background:#f2f079}.tpl-tag.em{background:#79bff2}
.tpl-img-ph{position:absolute;border:2px solid #000;border-radius:3px;box-shadow:2px 2px 0 #000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:24px;background:rgba(255,255,255,.5)}
 
.pg1-startbtn{position:absolute;bottom:0;left:0;right:0;height:68px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:center}
.pg1-startbtn button{width:230px;height:44px;background:#111;color:#fff;border:none;border-radius:200px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #555}
.pg1-startbtn button:active{transform:translate(2px,2px);box-shadow:none}
 
/* ═══════════════════════════════════════
   S2 편집
═══════════════════════════════════════ */
#pg2{background:#f0f0ec}
.topbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:50;background:#fff;border-bottom:1.5px solid #000}
.topbar-logo{position:absolute;left:50%;transform:translateX(-50%);font-size:18px;font-weight:800;letter-spacing:-.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000;color:#fff}
.tbtn{border:1.5px solid #000;border-radius:200px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 1.5px 0 #000;background:#fff;color:#111}
.tbtn.pk{background:#ffd7f6}
.tbtn:active{transform:translate(2px,1.5px);box-shadow:none}
#canvas{position:absolute;top:52px;left:0;right:0;bottom:68px;touch-action:none;background:#f0f0ec}
#canvas-inner{position:absolute;top:12px;left:12px;right:12px;bottom:12px;overflow:hidden;border-radius:8px;border:1.5px solid rgba(0,0,0,.1);box-shadow:0 2px 24px rgba(0,0,0,.12)}
#canvas-bg{position:absolute;inset:0;pointer-events:none}
#canvas-stage{position:absolute;inset:0;overflow:visible}
 
.el{position:absolute;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
.el.sel>.inn{outline:2px dashed #5773F8;outline-offset:4px}
.inn{position:relative;display:inline-block}
 
/* ── 핸들 — 모두 24×24 정사각형 circle ── */
.el-del,.el-rz,.el-rot,.el-edit,.el-replace{
  position:absolute;width:24px;height:24px;
  display:none;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;z-index:200;touch-action:none;
}
.el.sel .el-del,
.el.sel .el-rz,
.el.sel .el-rot,
.el.sel .el-edit,
.el.sel .el-replace{display:flex}
.el-del    {top:-13px;right:-13px;background:#111;border:none}
.el-rz     {bottom:-13px;right:-13px;background:#fff;border:2.5px solid #5773F8;cursor:nwse-resize}
.el-rot    {top:-30px;left:50%;transform:translateX(-50%);background:#FF8C42;border:2px solid #fff}
.el-edit   {top:-13px;left:-13px;background:#5773F8;border:none}
.el-replace{bottom:-13px;left:-13px;background:#FF8C42;border:none}
 
/* 핸들 아이콘 — 모두 16×16 고정 SVG */
.h-ico{width:16px;height:16px;display:block;flex-shrink:0}
 
/* 태그 */
.et,.ed,.ep,.em{font-family:'Pretendard',-apple-system,sans-serif!important}
.et{background:#ffd7f6;border:1.5px solid #000;border-radius:3px;padding:6px 10px;font-size:13px;font-weight:700;color:#000;white-space:nowrap;box-shadow:2px 2px 0 #000}
.ed{background:#79e0f2;border:1.5px solid #000;border-radius:3px;padding:8px 14px;font-size:13px;font-weight:700;color:#000;white-space:nowrap;box-shadow:2px 2px 0 #000}
.ep{background:#f2f079;border:1.5px solid #000;border-radius:3px;padding:6px 10px;font-size:13px;font-weight:700;color:#11100c;white-space:nowrap;box-shadow:2px 2px 0 #000}
.em{background:#79bff2;border:1.5px solid #000;padding:8px 10px;font-size:13px;font-weight:700;color:#11100c;width:140px;word-break:keep-all;line-height:1.5;box-shadow:2px 2px 0 #000}
.ei{border:2px solid #000;border-radius:3px;box-shadow:2px 2px 0 #000;overflow:hidden;display:block}
.ei img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none}
.esi{display:block;background:transparent;border:none;box-shadow:none}
.esi img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}
[contenteditable]{outline:none;min-width:20px;min-height:1em}
[contenteditable]:empty:before{content:attr(data-ph);opacity:.35;font-weight:400}
 
/* ── 툴바 — 24×24 SVG 아이콘 고정 ── */
#toolbar{position:fixed;bottom:0;left:0;right:0;height:68px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:space-around;padding:0 8px;z-index:9999}
.tlbtn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:2px 6px}
.ico{width:40px;height:40px;border:1.5px solid #000;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 #000;flex-shrink:0}
.tlbtn:active .ico{transform:translate(2px,2px);box-shadow:none}
.tlbtn span{font-size:9px;font-weight:600;color:#11100c}
/* 툴바 아이콘 항상 24×24 */
.ico svg{width:24px;height:24px;display:block;flex-shrink:0}
 
/* 패널 */
.panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;padding:14px 16px;display:none;flex-direction:column;gap:10px;max-height:260px;overflow-y:auto}
.panel.open{display:flex}
.prow{display:flex;gap:8px;align-items:center}
.pinp{flex:1;height:40px;border:1.5px solid #000;border-radius:6px;padding:0 12px;font-size:14px;outline:none;background:#fff}
.padd{height:40px;padding:0 16px;background:#000;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.tychips{display:flex;gap:6px;flex-wrap:wrap}
.tych{padding:6px 12px;border:1.5px solid #000;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:1.5px 1.5px 0 #000}
.tych.tt{background:#ffd7f6}.tych.td{background:#79e0f2}.tych.tp{background:#f2f079}.tych.tm{background:#79bff2}
.tych.on{box-shadow:none;transform:translate(1.5px,1.5px)}
 
#stk-panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;display:none;flex-direction:column;max-height:280px}
#stk-panel.open{display:flex}
.stk-cats{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 16px 8px;border-bottom:1px solid #e3e1db;flex-shrink:0}
.stk-cats::-webkit-scrollbar{display:none}
.cch{padding:4px 12px;border:1px solid #000;border-radius:200px;font-size:11px;font-weight:600;background:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cch.on{background:#000;color:#fff}
.stk-grid-wrap{overflow-y:auto;padding:10px 16px 16px;flex:1;min-height:0}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,52px);gap:6px;width:100%}
.st{cursor:pointer;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border:1.5px solid #e3e1db;border-radius:8px;overflow:hidden;background:#f7f7f7;font-size:28px}
.st.loaded img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.st:active{transform:scale(.93)}
 
#bg-panel{position:fixed;bottom:68px;left:0;right:0;z-index:9998;background:#fff;border-top:1.5px solid #000;padding:12px 16px;display:none;flex-direction:column;gap:10px;max-height:200px}
#bg-panel.open{display:flex}
.bg-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.bg-scroll::-webkit-scrollbar{display:none}
/* 배경 스와치: CSS 색상으로 즉시 */
.bg-sw{flex-shrink:0;width:52px;height:72px;border:2px solid #ccc;border-radius:6px;cursor:pointer;transition:border-color .15s}
.bg-sw.sel{border-color:#5773F8;box-shadow:0 0 0 2px #5773F8}
.bg-sw:active{transform:scale(.93)}
.bg-upload-btn{flex-shrink:0;width:52px;height:72px;border:1.5px dashed #bbb;border-radius:6px;background:#f9f9f9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.bg-upload-btn span{font-size:9px;font-weight:600;color:#999}
 
#img-input,#bg-input,#replace-input{display:none}
#edit-bar{position:fixed;bottom:68px;left:0;right:0;height:44px;background:#5773F8;display:none;align-items:center;justify-content:center;gap:10px;z-index:9997}
#edit-bar.on{display:flex}
#edit-bar span{font-size:13px;font-weight:700;color:#fff}
.edit-done-btn{border:1.5px solid #fff;border-radius:200px;padding:5px 14px;font-size:12px;font-weight:700;color:#fff;background:transparent;cursor:pointer}
 
#dialog{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:24px}
.dialog-box{background:#fff;border:2px solid #000;border-radius:14px;box-shadow:4px 4px 0 #000;padding:24px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:16px}
.dialog-box h3{font-size:16px;font-weight:800;color:#111;line-height:1.4}
.dialog-box p{font-size:13px;color:#555;line-height:1.6}
.dialog-btns{display:flex;gap:8px}
.dialog-btns button{flex:1;height:44px;border-radius:8px;border:1.5px solid #000;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #000}
.dbtn-cancel{background:#fff;color:#111}
.dbtn-confirm{background:#111;color:#fff;border-color:#111}
 
/* ═══════════════════════════════════════
   S3 공유
═══════════════════════════════════════ */
#pg3{background:linear-gradient(180deg,#5773F8 0%,#fff 55%,#92B0F8 100%)}
.pg3-top{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1.5px solid #000;z-index:20}
#pg3-box{position:absolute;top:60px;left:16px;right:16px;bottom:158px;border:2.5px solid #000;border-radius:6px;box-shadow:4px 4px 0 #000;overflow:hidden;background:#f5f5f0}
.sharearea{position:absolute;bottom:0;left:0;right:0;height:152px;background:#fff;border-top:1.5px solid #000;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.shr-title{font-size:13px;font-weight:700;color:#111}
.linkbox{display:flex;align-items:center;gap:8px;background:#f5f5f0;border:1.5px solid #000;border-radius:6px;padding:8px 10px}
.linkurl{flex:1;font-size:12px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.copybtn{padding:6px 14px;background:#111;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}
.shrbtns{display:flex;gap:8px}
.shrbtn{flex:1;height:42px;border:1.5px solid #000;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #000;display:flex;align-items:center;justify-content:center;gap:5px}
.shrbtn.main{background:#111;color:#fff;border-color:#111}
.shrbtn.sub{background:#ffd7f6;color:#111}
.shrbtn:active{transform:translate(2px,2px);box-shadow:none}
/* 공유버튼 내부 아이콘도 16×16 고정 */
.shrbtn svg{width:16px;height:16px;flex-shrink:0}
 
/* ═══════════════════════════════════════
   S4 결과
═══════════════════════════════════════ */
#pg4{background:linear-gradient(180deg,#5773F8 0%,#fff 55%,#92B0F8 100%)}
.pg4-top{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;background:#fff;border-bottom:1.5px solid #000;z-index:20}
.pg4-logo{font-size:20px;font-weight:800;letter-spacing:-.5px;-webkit-text-stroke:1.5px #000;text-shadow:2px 2px 0 #000;color:#fff}
#pg4-box{position:absolute;top:60px;left:16px;right:16px;bottom:80px;border:2.5px solid #000;border-radius:6px;box-shadow:4px 4px 0 #000;overflow:hidden;background:#f5f5f0}
.pg4-bottom{position:absolute;bottom:0;left:0;right:0;height:72px;background:#fff;border-top:1.5px solid #000;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.pg4-made{font-size:12px;color:#888;font-weight:500}
.pg4-made strong{color:#5773F8;font-weight:800}
.pg4-make-btn{padding:10px 22px;background:#111;color:#fff;border:none;border-radius:200px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 #555}
.rr{position:absolute;top:0;left:0;transform-origin:top left}
.rr-bg{position:absolute;inset:0}
.rr-stage{position:absolute;inset:0}
 
#loading{position:fixed;inset:0;z-index:999999;background:rgba(255,255,255,.95);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading.on{display:flex}
.spin{width:36px;height:36px;border:3px solid #e3e1db;border-top-color:#5773F8;border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{font-size:14px;font-weight:600;color:#555}
</style>
</head>
<body>
<div id="app">
<div id="loading"><div class="spin"></div><p id="loading-msg">불러오는 중...</p></div>
 
<!-- ════ S1 홈 ════ -->
<div id="pg1" class="pg on">
  <div class="pg1-logo">Invi.kr</div>
  <p class="pg1-sub">어떤 자리를 만들고 싶으세요?</p>
  <div class="pg1-chips">
    <div class="chip-row">
      <div class="chip sel" data-tpl="party"   onclick="pickChip(this)">🎂 파티</div>
      <div class="chip"     data-tpl="brunch"  onclick="pickChip(this)">🧸 브런치</div>
      <div class="chip"     data-tpl="pajama"  onclick="pickChip(this)">🎉 파자마</div>
    </div>
    <div class="chip-row">
      <div class="chip"     data-tpl="wedding" onclick="pickChip(this)">💍 웨딩</div>
      <div class="chip"     data-tpl="fun"     onclick="pickChip(this)">🐌 병맛</div>
    </div>
  </div>
  <div class="pg1-mid">
    <p class="pg1-sec">TEMPLATES</p>
    <div class="showcase-outer">
      <div class="tpl-card" id="showcase-card" onclick="startFromChip()">
        <div class="tpl-card-body" id="showcase-body"></div>
        <div class="tpl-card-lbl"  id="showcase-lbl">파티</div>
      </div>
    </div>
  </div>
  <div class="pg1-startbtn">
    <button onclick="startFromChip()">이 템플릿으로 시작하기 →</button>
  </div>
</div>
 
<!-- ════ S2 편집 ════ -->
<div id="pg2" class="pg">
  <div class="topbar">
    <button class="tbtn" onclick="confirmBack()">← 뒤로</button>
    <span class="topbar-logo">Invi.kr</span>
    <button class="tbtn pk" onclick="goShare()">완성하기 →</button>
  </div>
  <div id="canvas">
    <div id="canvas-inner">
      <div id="canvas-bg"></div>
      <div id="canvas-stage"></div>
    </div>
  </div>
  <div id="edit-bar">
    <span>텍스트를 수정하고 있어요</span>
    <button class="edit-done-btn" onclick="exitEditMode()">완료</button>
  </div>
 
  <!-- 텍스트 패널 -->
  <div id="text-panel" class="panel">
    <div class="tychips">
      <div class="tych tt on" onclick="setTy('t',this)">제목</div>
      <div class="tych td"    onclick="setTy('d',this)">날짜</div>
      <div class="tych tp"    onclick="setTy('p',this)">장소</div>
      <div class="tych tm"    onclick="setTy('m',this)">메모</div>
    </div>
    <div class="prow">
      <input class="pinp" id="tinp" placeholder="원하는 문구를 입력하세요" maxlength="80"
             onkeydown="if(event.key==='Enter')addTxt()">
      <button class="padd" onclick="addTxt()">추가</button>
    </div>
  </div>
 
  <!-- 스티커 패널 -->
  <div id="stk-panel">
    <div class="stk-cats" id="catrow"></div>
    <div class="stk-grid-wrap"><div class="sgrid" id="sgrid"></div></div>
  </div>
 
  <!-- 배경 패널 — CSS 색상 스와치, 이미지 로딩 없음 -->
  <div id="bg-panel">

function loadTemplate(tpl){
  var stage=document.getElementById('canvas-stage');
  stage.innerHTML=''; S.nid=1; S.sel=null; S.editMode=false; exitEditMode();
  CUR_BG_COLOR=tpl.bgColor; CUR_BG_IMG='';
  applyBg(); go('pg2','pg1');
  setTimeout(function(){
    var sw=stage.clientWidth, sh=stage.clientHeight;
    var sx=sw/200, sy=sh/250;
    tpl.deco.forEach(function(d){
      var x=Math.round(d.x*sx), y=Math.round(d.y*sy);
      if(d.type==='tag'){
        var el=addEl(d.cls[1],d.text,x,y);
        if(d.rot&&el){el._rot=d.rot;el.style.transform='rotate('+d.rot+'deg)';}
        if(d.smallText&&el){var c=el.querySelector('.em');if(c)c.style.fontSize='10px';}
      } else if(d.type==='emoji'){
        addEmojiSticker(d.e, x, y, Math.round((d.size||32)*Math.min(sx,sy)));
      } else if(d.type==='imgph'){
        // 이미지 자리 placeholder
        addEl('i', null, x, y, Math.round(d.w*sx), Math.round(d.h*sy), null, d.e||'🖼');
      }
    });
  },30);
}

/* ═══════════════════════════════════════════════
   링크 저장/불러오기 (localStorage + 짧은 ?k=KEY)
═══════════════════════════════════════════════ */
function saveLocal(snap){
  var key='k'+Date.now().toString(36);
  try{localStorage.setItem('invi_'+key,JSON.stringify(snap));}
  catch(e){pruneOld();localStorage.setItem('invi_'+key,JSON.stringify(snap));}
  return key;
}
function loadLocal(key){
  var s=localStorage.getItem('invi_'+key);
  if(!s)throw new Error('no_data');
  return JSON.parse(s);
}
function pruneOld(){
  var ks=[];
  for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('invi_'))ks.push(k);}
  ks.sort().slice(0,Math.ceil(ks.length/2)).forEach(function(k){localStorage.removeItem(k);});
}

function checkHash(){
  var params=new URLSearchParams(location.search);
  var key=params.get('k');
  if(!key) return false;
  showLoading('초대장 불러오는 중...');
  try{
    SNAP=loadLocal(key);
    hideLoading(); showResultOnly(); return true;
  }catch(e){
    hideLoading();
    showErrPage();
    return false;
  }
}

function go(to,from){if(from)document.getElementById(from).classList.remove('on');document.getElementById(to).classList.add('on');closeP();desel();document.getElementById('toolbar').style.display=(to==='pg2'?'flex':'none');}
 
/* ── 배경 ── */
function applyBg(){
  var bg=document.getElementById('canvas-bg');
  if(CUR_BG_IMG){
    bg.style.backgroundImage='url('+CUR_BG_IMG+')';
    bg.style.backgroundSize='cover';
    bg.style.backgroundPosition='center';
    bg.style.background='';
  } else {
    bg.style.backgroundImage='';
    bg.style.background=CUR_BG_COLOR||'#f5f5f5';
  }
}
function setBgImg(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    CUR_BG_IMG=ev.target.result; CUR_BG_COLOR='';
    document.querySelectorAll('.bg-sw').forEach(function(s){s.classList.remove('sel');});
    applyBg(); closeP();
  };
  r.readAsDataURL(f); e.target.value='';
}
 
function enterEditMode(cel){S.editMode=true;cel.contentEditable='true';document.getElementById('edit-bar').classList.add('on');closeP();setTimeout(function(){cel.focus();try{var r=document.createRange();r.selectNodeContents(cel);r.collapse(false);var ws=window.getSelection();ws.removeAllRanges();ws.addRange(r);}catch(ee){}},50);}
function exitEditMode(){S.editMode=false;document.getElementById('edit-bar').classList.remove('on');document.querySelectorAll('[contenteditable="true"]').forEach(function(el){el.contentEditable='false';el.blur();});}
function setTy(ty,el){S.ty=ty;document.querySelectorAll('.tych').forEach(function(c){c.classList.remove('on')});el.classList.add('on');}
function tp(id){var was=document.getElementById(id).classList.contains('open');closeP();exitEditMode();if(!was){if(id==='stk-panel')buildStk();document.getElementById(id).classList.add('open');}desel();}
function closeP(){document.querySelectorAll('#text-panel,#stk-panel,#bg-panel').forEach(function(p){p.classList.remove('open')});}
function addTxt(){var v=document.getElementById('tinp').value.trim();if(!v)return;var stage=document.getElementById('canvas-stage');var sw=stage.clientWidth,sh=stage.clientHeight;addEl(S.ty,v,sw/2-40+(Math.random()-.5)*60,sh/2+(Math.random()-.5)*60);document.getElementById('tinp').value='';closeP();}
 
/* ═══════════════════════════════════════════════
   요소 생성
═══════════════════════════════════════════════ */
function mkHandle(cls, iconHtml){
  var d=document.createElement('div'); d.className=cls;
  d.innerHTML=iconHtml; return d;
}
function addEl(type, content, x, y, w, h, fb, placeholder){
  var stage=document.getElementById('canvas-stage');
  var id='e'+(S.nid++);
  var wrap=document.createElement('div');wrap.id=id;wrap.className='el';
  wrap.style.left=Math.max(0,x)+'px'; wrap.style.top=Math.max(0,y)+'px';
  wrap.dataset.type=type;
  var inn=document.createElement('div');inn.className='inn';
  var cel;
  if(type==='i'){
    cel=document.createElement('div');cel.className='ei';
    cel.style.width=(w||120)+'px';cel.style.height=(h||120)+'px';
    if(fb) cel.style.background=fb;
    if(content){
      var img=document.createElement('img');img.decoding='async';img.src=content;
      cel.appendChild(img);
    } else {
      // placeholder 이모지
      cel.style.display='flex';cel.style.alignItems='center';cel.style.justifyContent='center';
      cel.style.fontSize='36px';cel.style.background='rgba(255,255,255,.6)';
      cel.textContent=placeholder||'🖼';
    }
  } else {
    var tm={t:'et',d:'ed',p:'ep',m:'em'};var cls=tm[type]||(type.length===2?type:'et');
    cel=document.createElement('div');cel.className=cls;cel.textContent=content;
    cel.dataset.isText='1';cel.setAttribute('data-ph','내용 입력');
  }
  inn.appendChild(cel);
 
  // 핸들
  var del  = mkHandle('el-del',     ICO.del);
  var rz   = mkHandle('el-rz',      ICO.resize);
  var rot  = mkHandle('el-rot',     ICO.rotate);
  var editBtn  = null;
  var replBtn  = null;
  if(cel.dataset&&cel.dataset.isText){
    editBtn = mkHandle('el-edit', ICO.edit);
    editBtn.addEventListener('click',function(e){e.stopPropagation();sel(id);enterEditMode(cel);});
  }
  if(type==='i'){
    replBtn = mkHandle('el-replace', ICO.imgReplace);
    replBtn.addEventListener('click',function(e){
      e.stopPropagation();replaceTargetId=id;
      document.getElementById('replace-input').click();
    });
  }
  del.addEventListener('pointerdown',function(e){e.stopPropagation();});
  del.addEventListener('click',function(e){e.stopPropagation();stage.removeChild(wrap);if(S.sel===id)S.sel=null;exitEditMode();});
  rz.style.touchAction='none';
  rz.addEventListener('pointerdown',function(e){e.stopPropagation();startRz(e,wrap,cel,type);});
  rot.style.touchAction='none';
  rot.addEventListener('pointerdown',function(e){e.stopPropagation();startRot(e,wrap);});
 
  inn.appendChild(del);
  if(editBtn)inn.appendChild(editBtn);
  if(replBtn)inn.appendChild(replBtn);
  inn.appendChild(rz); inn.appendChild(rot);
  wrap.appendChild(inn);
 
  wrap.addEventListener('pointerdown',function(e){
    if(del.contains(e.target)||rz.contains(e.target)||rot.contains(e.target)||
       (editBtn&&editBtn.contains(e.target))||(replBtn&&replBtn.contains(e.target)))return;
    if(cel.contentEditable==='true')return;
    e.preventDefault();closeP();sel(id);startDrag(e,wrap);
  });
  if(cel.dataset&&cel.dataset.isText){
    cel.addEventListener('blur',function(){cel.contentEditable='false';S.editMode=false;document.getElementById('edit-bar').classList.remove('on');});
    cel.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cel.blur();}if(e.key==='Escape')cel.blur();});
  }
  stage.appendChild(wrap);return wrap;
}
 
/* 이미지 교체 */
function replaceImg(e){
  var f=e.target.files[0];if(!f||!replaceTargetId)return;
  if(f.size>1*1024*1024){toast('이미지가 너무 커요 (최대 1MB)');e.target.value='';return;}
  var r=new FileReader();
  r.onload=function(ev){
    var wrap=document.getElementById(replaceTargetId);
    if(!wrap){return;}
    var cel=wrap.querySelector('.ei');
    if(cel){
      cel.style.display='block';cel.style.fontSize='';cel.style.alignItems='';cel.style.justifyContent='';cel.style.background='';cel.textContent='';
      var img=document.createElement('img');img.decoding='async';img.src=ev.target.result;cel.appendChild(img);
    }
    replaceTargetId=null;
  };
  r.readAsDataURL(f);e.target.value='';
}
 
/* 이모지 스티커 */
function addEmojiSticker(emoji, x, y, size){
  size=size||40;
  var stage=document.getElementById('canvas-stage');
  var id='e'+(S.nid++);
  var wrap=document.createElement('div');wrap.id=id;wrap.className='el';
  wrap.style.left=Math.max(0,x)+'px';wrap.style.top=Math.max(0,y)+'px';wrap.dataset.type='es';
  var inn=document.createElement('div');inn.className='inn';
  var cel=document.createElement('div');
  cel.style.cssText='font-size:'+size+'px;line-height:1;user-select:none;cursor:grab;width:'+(size+4)+'px;height:'+(size+4)+'px;display:flex;align-items:center;justify-content:center;';
  cel.textContent=emoji;
  inn.appendChild(cel);
  var del=mkHandle('el-del',ICO.del);
  del.addEventListener('pointerdown',function(e){e.stopPropagation();});
  del.addEventListener('click',function(e){e.stopPropagation();stage.removeChild(wrap);if(S.sel===id)S.sel=null;});
  var rz=mkHandle('el-rz',ICO.resize);
  rz.style.touchAction='none';
  rz.addEventListener('pointerdown',function(e){e.stopPropagation();startRzEmoji(e,wrap,cel);});
  var rot=mkHandle('el-rot',ICO.rotate);
  rot.style.touchAction='none';
  rot.addEventListener('pointerdown',function(e){e.stopPropagation();startRot(e,wrap);});
  inn.appendChild(del);inn.appendChild(rz);inn.appendChild(rot);wrap.appendChild(inn);
  wrap.addEventListener('pointerdown',function(e){if(del.contains(e.target)||rz.contains(e.target)||rot.contains(e.target))return;e.preventDefault();closeP();sel(id);startDrag(e,wrap);});
  stage.appendChild(wrap);return wrap;
}
 
function sel(id){desel();S.sel=id;var el=document.getElementById(id);if(el)el.classList.add('sel');}
function desel(){if(S.sel){var o=document.getElementById(S.sel);if(o)o.classList.remove('sel');S.sel=null;}}
document.getElementById('canvas').addEventListener('pointerdown',function(e){var t=e.target;if(t===document.getElementById('canvas')||t===document.getElementById('canvas-inner')||t===document.getElementById('canvas-bg')||t===document.getElementById('canvas-stage')){desel();closeP();exitEditMode();}});
 
function startDrag(e,wrap){var sx=e.clientX,sy=e.clientY,sl=parseInt(wrap.style.left)||0,st=parseInt(wrap.style.top)||0;try{wrap.setPointerCapture(e.pointerId);}catch(err){}wrap.style.cursor='grabbing';wrap.style.zIndex='99';function mv(e){wrap.style.left=(sl+(e.clientX-sx))+'px';wrap.style.top=(st+(e.clientY-sy))+'px';}function up(){wrap.style.cursor='grab';wrap.style.zIndex='';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);}
function startRz(e,wrap,cel,type){var sx=e.clientX,sy=e.clientY,sw0=cel.offsetWidth||80,sh0=cel.offsetHeight||80,fs=parseFloat(getComputedStyle(cel).fontSize)||13;try{wrap.setPointerCapture(e.pointerId);}catch(err){}function mv(e){var dx=e.clientX-sx,dy=e.clientY-sy;if(type==='i'){cel.style.width=Math.max(30,sw0+dx)+'px';cel.style.height=Math.max(30,sh0+dy)+'px';}else{var d=(dx+dy)/2;cel.style.fontSize=Math.max(8,Math.min(60,fs+d*.15))+'px';}}function up(){wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);}
function startRzEmoji(e,wrap,cel){var sx=e.clientX,sy=e.clientY,fs=parseFloat(cel.style.fontSize)||36;try{wrap.setPointerCapture(e.pointerId);}catch(err){}function mv(e){var d=(e.clientX-sx+e.clientY-sy)/2;var nfs=Math.max(16,Math.min(96,fs+d*.15));cel.style.fontSize=nfs+'px';cel.style.width=(nfs+4)+'px';cel.style.height=(nfs+4)+'px';}function up(){wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);}
function startRot(e,wrap){var rect=wrap.getBoundingClientRect();var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;var sa=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);var cr=wrap._rot||0;try{wrap.setPointerCapture(e.pointerId);}catch(err){}wrap.style.cursor='grabbing';function mv(e){var a=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);wrap._rot=cr+(a-sa);wrap.style.transform='rotate('+wrap._rot+'deg)';}function up(){wrap.style.cursor='grab';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);}
 
function addImg(e){var f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){toast('이미지가 너무 커요 (최대 2MB)');e.target.value='';return;}var r=new FileReader();r.onload=function(ev){var stage=document.getElementById('canvas-stage');var sw=stage.clientWidth,sh=stage.clientHeight;addEl('i',ev.target.result,sw/2-60+(Math.random()-.5)*60,sh/2-60+(Math.random()-.5)*60,120,120);};r.readAsDataURL(f);e.target.value='';}
 
/* ═══════════════════════════════════════════════

function buildStk(){
  var cr=document.getElementById('catrow');cr.innerHTML='';
  var all=document.createElement('div');all.className='cch on';all.textContent='전체';cr.appendChild(all);
  var g=document.getElementById('sgrid');g.innerHTML='';
  EMOJI_STK.forEach(function(emoji){
    var el=document.createElement('div');el.className='st';
    el.textContent=emoji;
    el.onclick=function(){
      var stage=document.getElementById('canvas-stage');var sw=stage.clientWidth,sh=stage.clientHeight;
      addEmojiSticker(emoji,sw/2-24+(Math.random()-.5)*80,sh/2-24+(Math.random()-.5)*60,40);
      closeP();
    };
    g.appendChild(el);
  });
}
 
/* ═══════════════════════════════════════════════
   스냅샷 / 렌더
═══════════════════════════════════════════════ */
function makeSnap(){
  var stage=document.getElementById('canvas-stage');
  var clone=stage.cloneNode(true);
  clone.querySelectorAll('.el-del,.el-rz,.el-edit,.el-rot,.el-replace').forEach(function(el){el.remove();});
  clone.querySelectorAll('.el').forEach(function(el){el.classList.remove('sel');el.style.pointerEvents='none';el.style.cursor='default';});
  clone.querySelectorAll('[contenteditable]').forEach(function(el){el.removeAttribute('contenteditable');});
  return{
    stageW:stage.clientWidth, stageH:stage.clientHeight,
    bgColor:CUR_BG_COLOR||'#f5f5f5',
    bgImg:CUR_BG_IMG||'',
    elemsHTML:clone.innerHTML
  };
}
function renderSnap(boxId){
  var box=document.getElementById(boxId);box.innerHTML='';
  if(!SNAP)return;
  var bw=box.clientWidth,bh=box.clientHeight;
  var scale=Math.min(bw/SNAP.stageW,bh/SNAP.stageH);
  var rend=document.createElement('div');rend.className='rr';
  rend.style.width=SNAP.stageW+'px';rend.style.height=SNAP.stageH+'px';
  rend.style.transform='scale('+scale+')';rend.style.transformOrigin='top left';
  rend.style.left=((bw-SNAP.stageW*scale)/2)+'px';rend.style.top=((bh-SNAP.stageH*scale)/2)+'px';
  var bg=document.createElement('div');bg.className='rr-bg';
  if(SNAP.bgImg){bg.style.backgroundImage='url('+SNAP.bgImg+')';bg.style.backgroundSize='cover';bg.style.backgroundPosition='center';}
  else{bg.style.background=SNAP.bgColor||'#f5f5f5';}
  rend.appendChild(bg);
  var sd=document.createElement('div');sd.className='rr-stage';sd.innerHTML=SNAP.elemsHTML;rend.appendChild(sd);
  box.appendChild(rend);
}

function goShare(){
  desel();exitEditMode();
  SNAP=makeSnap();
  renderSnap('pg3-box');
  go('pg3','pg2');
 
  var urlEl=document.getElementById('shareurl');
  var btn=document.getElementById('copybtn');
  urlEl.textContent='링크 만드는 중...';btn.disabled=true;btn.textContent='생성 중';
 
  try{
    var key=saveLocal(SNAP);
    var url=location.origin+location.pathname+'?k='+key;
    SHARE_URL=url;
    urlEl.textContent=url;
    btn.disabled=false;btn.textContent='복사';
    toast('링크 생성 완료! 📎');
  }catch(e){
    urlEl.textContent='저장 오류: '+e.message;
    btn.disabled=false;btn.textContent='재시도';
    toast('오류가 발생했어요');
  }
}
 
function copyLink(){
  if(!SHARE_URL){toast('먼저 완성하기를 눌러주세요.');return;}
  if(navigator.clipboard){navigator.clipboard.writeText(SHARE_URL).then(function(){toast('링크 복사 완료! 붙여넣어 보내주세요 📋');}).catch(function(){fbCopy(SHARE_URL);});}
  else{fbCopy(SHARE_URL);}
}
function fbCopy(url){var ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');toast('링크 복사 완료! 📋');}catch(e){toast('직접 복사해주세요.');}document.body.removeChild(ta);}
function nativeShare(){if(!SHARE_URL){toast('먼저 완성하기를 눌러주세요.');return;}if(navigator.share){navigator.share({title:'초대장이 도착했어요 🎉',text:'Invi.kr 초대장을 확인해보세요!',url:SHARE_URL}).catch(function(){copyLink();});}else{copyLink();}}

function toast(msg){var t=document.getElementById('_t');if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:200px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},3000);}
