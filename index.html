<style>

</style>

<script>
var EV={party:{e:'рЯОВ',bg:'linear-gradient(135deg,#ff3737,#ff8c42)'},brunch:{e:'рЯІЄ',bg:'linear-gradient(135deg,#a8e6cf,#dcedc1)'},pajama:{e:'рЯОЙ',bg:'linear-gradient(135deg,#ffd3e0,#c9b1d4)'},wedding:{e:'рЯТН',bg:'linear-gradient(135deg,#ffeaa7,#fdcb6e)'},fun:{e:'рЯРМ',bg:'linear-gradient(135deg,#a29bfe,#6c5ce7)'}};
var BGLST=[{bg:'linear-gradient(135deg,#ff3737,#ff8c42)',e:'рЯОВ'},{bg:'linear-gradient(135deg,#ffd3e0,#c9b1d4)',e:'рЯМЄ'},{bg:'linear-gradient(135deg,#79e0f2,#5773F8)',e:'рЯМК'},{bg:'linear-gradient(135deg,#a8e6cf,#69b274)',e:'рЯМњ'},{bg:'linear-gradient(135deg,#ffeaa7,#ff8c42)',e:'рЯМЕ'},{bg:'linear-gradient(135deg,#2c3e50,#6c5ce7)',e:'рЯМЩ'},{bg:'#fff',e:'вђЬ'},{bg:'#f8f7f4',e:'рЯН¶'}];
var STK={'к∞РмД±':['рЯМЄ','рЯМЈ','рЯМє','рЯМї','рЯМИ','в≠Р','вЬ®','рЯТЂ','рЯ¶Л','рЯОА','рЯОБ','рЯОК','рЯ©Ј','рЯІ°','рЯТЫ','рЯТЪ','рЯТЩ','рЯТЬ'],'мЭМмЛЭ':['рЯН∞','рЯОВ','рЯІБ','рЯН©','рЯН™','рЯНУ','рЯНС','рЯНК','рЯНЛ','рЯІГ','вШХ','рЯНµ','рЯ•В','рЯНЊ','рЯ•Ю','рЯН≥'],'нММнЛ∞':['рЯОЙ','рЯОИ','рЯОК','рЯО§','рЯОµ','рЯОґ','рЯ•≥','рЯОЖ','рЯОЗ','рЯ™Д','рЯО≠','рЯО™','рЯО†','рЯО°','рЯОҐ','рЯОЛ'],'мЭіл™®':['рЯШН','рЯ•∞','рЯШШ','рЯШК','рЯ§©','рЯШО','рЯ•є','рЯШЖ','рЯ§£','рЯШВ','рЯШЬ','рЯ§™','рЯ§Ч','рЯШЗ','рЯЂґ','рЯЩМ'],'мЧђнЦЙ':['вЬИпЄП','рЯМН','рЯЧЇпЄП','рЯПЭпЄП','вЫ±пЄП','рЯМЕ','рЯПФпЄП','рЯЧЉ','рЯО°','рЯЫ≥пЄП','рЯЪВ','рЯЪЧ','рЯП°','рЯМГ','рЯМЖ','рЯМЙ']};
var CATS=['all','к∞РмД±','мЭМмЛЭ','нММнЛ∞','мЭіл™®','мЧђнЦЙ'];
var S={ev:'party',ty:'t',cat:'all',sel:null,nid:1};

function go(to,from){if(from)document.getElementById(from).classList.remove('on');document.getElementById(to).classList.add('on');closeP();desel();}
function pickEvent(el){document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel')});el.classList.add('sel');S.ev=el.dataset.type;var ev=EV[S.ev];document.getElementById('pbg').style.background=ev.bg;document.getElementById('pbg').querySelector('span').textContent=ev.e;}
function startEdit(){initCanvas();go('pg2','pg1');}
function initCanvas(){var c=document.getElementById('canvas');c.innerHTML='';S.nid=1;S.sel=null;var ev=EV[S.ev];var bg=document.createElement('div');bg.id='cbg';bg.style.cssText='position:absolute;inset:0;background:'+ev.bg+';display:flex;align-items:center;justify-content:center;font-size:80px;pointer-events:none;';bg.innerHTML='<span>'+ev.e+'</span>';c.appendChild(bg);var name=S.ev==='party'?'мЪ∞л¶ђмЭШ нММнЛ∞':S.ev==='brunch'?'мЪ∞л¶ђмЭШ лЄМлЯ∞мєШ':'мЪ∞л¶ђмЭШ мЭіл≤§нКЄ';setTimeout(function(){var cw=c.clientWidth;addEl('t',name,16,16);addEl('d','5мЫФ 16мЭЉ',cw-120,16);addEl('p','мД†л¶ЙмЧ≠ 9л≤И мґЬкµђ',16,76);},30);}
function resetCanvas(){if(!confirm('міИкЄ∞нЩФнХ†кєМмЪФ?'))return;initCanvas();}
function setTy(ty,el){S.ty=ty;document.querySelectorAll('.tych').forEach(function(c){c.classList.remove('on')});el.classList.add('on');}
function tp(id){var was=document.getElementById(id).classList.contains('open');closeP();if(!was){if(id==='stk-panel')buildStk();if(id==='bg-panel')buildBg();document.getElementById(id).classList.add('open');}desel();}
function closeP(){document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('open')})}
function buildBg(){var w=document.getElementById('bgpresets');w.innerHTML='';BGLST.forEach(function(b){var btn=document.createElement('button');btn.className='bgbtn';btn.style.background=b.bg;btn.textContent=b.e;btn.onclick=function(){var bg=document.getElementById('cbg');bg.style.background=b.bg;bg.style.backgroundImage='';bg.style.backgroundSize='';bg.innerHTML='<span>'+b.e+'</span>';closeP();};w.appendChild(btn);});}
function setBg(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var bg=document.getElementById('cbg');bg.style.background='none';bg.style.backgroundImage='url('+ev.target.result+')';bg.style.backgroundSize='cover';bg.style.backgroundPosition='center';bg.innerHTML='';closeP();};r.readAsDataURL(f);e.target.value='';}
function addTxt(){var v=document.getElementById('tinp').value.trim();if(!v)return;var c=document.getElementById('canvas');addEl(S.ty,v,c.clientWidth/2-40+(Math.random()-.5)*60,c.clientHeight/2+(Math.random()-.5)*60);document.getElementById('tinp').value='';closeP();}

function addEl(type,content,x,y,w,h){
  var c=document.getElementById('canvas');
  var id='e'+(S.nid++);
  var wrap=document.createElement('div');
  wrap.id=id;wrap.className='el';
  wrap.style.left=Math.max(0,x)+'px';
  wrap.style.top=Math.max(0,y)+'px';
  wrap.dataset.type=type;
  var inn=document.createElement('div');inn.className='inn';
  var cel;
  if(type==='s'){
    cel=document.createElement('div');cel.className='es';cel.textContent=content;
  } else if(type==='i'){
    cel=document.createElement('div');cel.className='ei';
    cel.style.width=(w||120)+'px';cel.style.height=(h||120)+'px';
    var img=document.createElement('img');img.src=content;cel.appendChild(img);
  } else {
    var cls={t:'et',d:'ed',p:'ep',m:'em'}[type]||'et';
    cel=document.createElement('div');cel.className=cls;
    cel.textContent=content;
    cel.dataset.isText='1';
    cel.setAttribute('data-ph','нЕНмК§нКЄ мЮЕл†•');
  }
  inn.appendChild(cel);
  var del=document.createElement('button');
  del.className='el-del';del.textContent='√Ч';
  del.addEventListener('pointerdown',function(e){e.stopPropagation();});
  del.addEventListener('click',function(e){e.stopPropagation();c.removeChild(wrap);if(S.sel===id)S.sel=null;});
  var rz=document.createElement('div');rz.className='el-rz';
  rz.addEventListener('pointerdown',function(e){e.stopPropagation();startRz(e,wrap,cel,type);});
  inn.appendChild(del);inn.appendChild(rz);
  wrap.appendChild(inn);

  var lastTap=0;
  wrap.addEventListener('pointerdown',function(e){
    if(e.target===del||e.target===rz)return;
    if(cel.contentEditable==='true'){return;}
    e.preventDefault();
    closeP();
    var now=Date.now();
    var isDoubleTap=(now-lastTap<350)&&S.sel===id&&cel.dataset.isText;
    lastTap=now;
    if(isDoubleTap){
      cel.contentEditable='true';
      cel.style.cursor='text';
      cel.focus();
      var range=document.createRange();
      range.selectNodeContents(cel);range.collapse(false);
      var ws=window.getSelection();ws.removeAllRanges();ws.addRange(range);
      return;
    }
    sel(id);
    startDrag(e,wrap);
  });

  if(cel.dataset.isText){
    cel.addEventListener('blur',function(){cel.contentEditable='false';cel.style.cursor='';});
    cel.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cel.blur();}if(e.key==='Escape'){cel.blur();}});
  }

  c.appendChild(wrap);return wrap;
}

function sel(id){desel();S.sel=id;var el=document.getElementById(id);if(el)el.classList.add('sel');}
function desel(){
  if(S.sel){
    var o=document.getElementById(S.sel);
    if(o){
      o.classList.remove('sel');
      var edCel=o.querySelector('[data-is-text]');
      if(!edCel)edCel=o.querySelector('[data-isText]');
      if(edCel&&edCel.contentEditable==='true'){edCel.blur();}
    }
    S.sel=null;
  }
}
document.getElementById('canvas').addEventListener('pointerdown',function(e){if(e.target===this){desel();closeP();}});

function startDrag(e,wrap){
  var c=document.getElementById('canvas');
  var sx=e.clientX,sy=e.clientY;
  var sl=parseInt(wrap.style.left)||0,st=parseInt(wrap.style.top)||0;
  try{wrap.setPointerCapture(e.pointerId);}catch(err){}
  wrap.style.cursor='grabbing';wrap.style.zIndex='99';
  function mv(e){
    var nx=Math.max(-wrap.offsetWidth*.3,Math.min(c.clientWidth-wrap.offsetWidth*.7,sl+(e.clientX-sx)));
    var ny=Math.max(-wrap.offsetHeight*.3,Math.min(c.clientHeight-wrap.offsetHeight*.7,st+(e.clientY-sy)));
    wrap.style.left=nx+'px';wrap.style.top=ny+'px';
  }
  function up(){wrap.style.cursor='grab';wrap.style.zIndex='';wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);wrap.removeEventListener('pointercancel',up);}
  wrap.addEventListener('pointermove',mv);
  wrap.addEventListener('pointerup',up);
  wrap.addEventListener('pointercancel',up);
}

function startRz(e,wrap,cel,type){var sx=e.clientX,sy=e.clientY,sw=cel.offsetWidth||80,sh=cel.offsetHeight||80,ss=parseFloat(cel.style.fontSize)||parseFloat(getComputedStyle(cel).fontSize)||13;wrap.setPointerCapture(e.pointerId);function mv(e){var dx=e.clientX-sx,dy=e.clientY-sy,d=(dx+dy)/2;if(type==='s'){cel.style.fontSize=Math.max(16,Math.min(100,ss+d*.4))+'px';}else if(type==='i'){cel.style.width=Math.max(60,sw+dx)+'px';cel.style.height=Math.max(60,sh+dy)+'px';}else{cel.style.fontSize=Math.max(8,Math.min(60,ss+d*.2))+'px';}}function up(){wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);}wrap.addEventListener('pointermove',mv);wrap.addEventListener('pointerup',up);}
function addImg(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var c=document.getElementById('canvas');addEl('i',ev.target.result,c.clientWidth/2-60+(Math.random()-.5)*60,c.clientHeight/2-60+(Math.random()-.5)*60,120,120);};r.readAsDataURL(f);e.target.value='';}
function buildStk(){var cr=document.getElementById('catrow');cr.innerHTML='';CATS.forEach(function(c){var el=document.createElement('div');el.className='cch'+(c===S.cat?' on':'');el.textContent=c==='all'?'м†Дм≤і':c;el.onclick=function(){S.cat=c;buildStk();};cr.appendChild(el);});var g=document.getElementById('sgrid');g.innerHTML='';var cats=S.cat==='all'?Object.keys(STK):[S.cat];cats.forEach(function(cat){STK[cat].forEach(function(s){var el=document.createElement('div');el.className='st';el.textContent=s;el.onclick=function(){var c=document.getElementById('canvas');addEl('s',s,c.clientWidth/2-20+(Math.random()-.5)*100,c.clientHeight/2-20+(Math.random()-.5)*80);closeP();};g.appendChild(el);});});}
function goShare(){desel();var src=document.getElementById('canvas');var dest=document.getElementById('pg3-canvas');dest.innerHTML=src.innerHTML;dest.querySelectorAll('.el').forEach(function(el){el.style.pointerEvents='none';el.classList.remove('sel');});dest.querySelectorAll('.el-del,.el-rz').forEach(function(el){el.style.display='none';});dest.querySelectorAll('[contenteditable]').forEach(function(el){el.removeAttribute('contenteditable');});document.getElementById('shareurl').textContent=window.location.href;go('pg3','pg2');}
function nativeShare(){var url=window.location.href;if(navigator.share){navigator.share({title:'Invi.kr міИлМАмЮ•',text:'міИлМАмЮ•мЭД нЩХмЭЄнХШмДЄмЪФ!',url:url}).catch(function(){});}else{copyLink();}}
function copyLink(){var url=document.getElementById('shareurl').textContent;if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){toast('лІБнБђк∞А л≥µмВђлРРмЦімЪФ!')});}else{toast(url);}}
function toast(msg){var t=document.getElementById('_toast');if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:200px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},2200);}
initCanvas();
</script>
